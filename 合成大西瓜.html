  let score = 0;
  let bestScore = Number(localStorage.getItem(STORAGE_KEY) || 0);
  let aimX = W / 2;
  let currentLevel = randomStartLevel();
  let nextLevel = randomStartLevel();
  let highestLevel = Math.max(currentLevel, nextLevel);
  let comboCount = 0;
  let lastComboAt = -9999;
  let lastDropAt = -9999;
  let canDrop = true;
  let gameOver = false;
  let dangerTime = 0;
  let lastFrame = performance.now();
  let physicsAccumulator = 0;
  let dpr = 1;
  let stageRect = null;
  let mergeSerial = 1;
  let pathOpen = false;
  let cheatMode = false;
  let cheatModeLevel = 0;
  let cheatTapTimes = [];
  let cheatDrag = null;
  let cheatSelection = [];
  let cheatToastTimer = null;
  let catalogDrag = null;
  let watermelonAchievements = Math.max(0, Math.floor(Number(localStorage.getItem(WATERMELON_COUNT_KEY)) || 0));
  let clearBannerTimer = null;
  let trophyPulseTimer = null;
  let supportCheckElapsed = 0;

  scoreEl.textContent = "0";
  bestEl.textContent = String(bestScore);
  watermelonCountEl.textContent = String(watermelonAchievements);
  watermelonTrophy.setAttribute("aria-label", "已合成大西瓜 " + watermelonAchievements + " 个");
  watermelonTrophy.classList.toggle("is-visible", watermelonAchievements > 0);
  buildFruitProgress();
  updateNextFruitUi();
  updateFruitProgress();

  const audio = createAudioManager();
  updateSoundButton();

  setupWorld();
  resize();
  bindEvents();
  if (SELF_TEST_MODE) {
    runSelfTest();
  } else if (GALLERY_MODE) {
    runFruitGallery();
  } else {
    requestAnimationFrame(loop);
  }

  Events.on(engine, "collisionStart", function (event) {
    const now = performance.now();
    for (const pair of event.pairs) {
      const fa = pair.bodyA.fruit;
      const fb = pair.bodyB.fruit;

      if (fa) {
        pulseImpact(fa, pair.collision.depth || 0.6, pair.bodyB);
      }
      if (fb) {
        pulseImpact(fb, pair.collision.depth || 0.6, pair.bodyA);
      }

      if (fa && fb) {
        if (fa.cheatDragging || fb.cheatDragging) {
          continue;
        }
        const impact = relativeSpeed(pair.bodyA, pair.bodyB);
        if (impact > 1.15) {
          audio.playCollision(Math.max(fa.level, fb.level), impact);
        }
        tryMerge(fa, fb, now);
      } else if (fa || fb) {
        const fruit = fa || fb;
        const impact = Math.hypot(fruit.body.velocity.x, fruit.body.velocity.y);
        if (impact > 2.4 && now - fruit.lastSoundAt > 130) {
          fruit.lastSoundAt = now;
          audio.playCollision(fruit.level, impact * 0.6);
        }
      }
    }
  });

  function setupWorld() {
    for (const body of bounds) {
      World.remove(engine.world, body);
    }
    bounds = [
      Bodies.rectangle(LEFT_X - WALL / 2, H / 2 + 66, WALL, H + 160, {
        isStatic: true,
        friction: 0.8,
        render: { visible: false }
      }),
      Bodies.rectangle(RIGHT_X + WALL / 2, H / 2 + 66, WALL, H + 160, {
        isStatic: true,
        friction: 0.8,
        render: { visible: false }
      }),
      Bodies.rectangle(W / 2, FLOOR_Y + WALL / 2, RIGHT_X - LEFT_X + WALL * 2, WALL, {
        isStatic: true,
        friction: 0.95,
        restitution: 0.04,
        render: { visible: false }
      })
    ];
    World.add(engine.world, bounds);
  }

  function bindEvents() {
    window.addEventListener("resize", resize);
    window.addEventListener("keydown", handleKeyDown);
    window.addEventListener("pointermove", moveCatalogDrag);
    window.addEventListener("pointerup", function (event) {
      finishCatalogDrag(event, true);
    });
    window.addEventListener("pointercancel", function (event) {
      finishCatalogDrag(event, false);
    });

    canvas.addEventListener("pointermove", function (event) {
      if (cheatDrag) {
        moveCheatDrag(event);
        return;
      }
      updateAim(event);
    });

    canvas.addEventListener("pointerdown", function (event) {
      event.preventDefault();
      audio.unlock();
      canvas.focus({ preventScroll: true });
      if (cheatMode && beginCheatDrag(event)) {
        return;
      }
      updateAim(event);
      dropCurrentFruit();
    });

    canvas.addEventListener("pointerup", function (event) {
      finishCheatDrag(event, true);
    });

    canvas.addEventListener("pointercancel", function (event) {
      finishCheatDrag(event, false);
    });

    if (brandTitle) {
      brandTitle.addEventListener("click", registerCheatTap);
    }

    restartBtn.addEventListener("click", function () {
      audio.unlock();
      audio.playButton();
      resetGame();
    });

    playAgainBtn.addEventListener("click", function () {
      audio.unlock();
      audio.playButton();
      resetGame();
    });

    if (nextPill) {
      nextPill.addEventListener("click", function (event) {
        if (!isMobilePathMode()) {
          return;
        }
        event.preventDefault();
        audio.unlock();
        setPathPanelOpen(!pathOpen);
      });
    }

    if (pathScrim) {
      pathScrim.addEventListener("click", function () {
        setPathPanelOpen(false);
      });
    }

    soundBtn.addEventListener("click", function () {
      audio.unlock();
      audio.setMuted(!audio.muted);
      updateSoundButton();
      if (!audio.muted) {
        audio.playButton();
      }
    });
  }

  function handleKeyDown(event) {
    if (event.altKey || event.ctrlKey || event.metaKey) {
      return;
    }
    const key = event.key;
    if (key === "Escape" && cheatDrag) {
      event.preventDefault();
      cancelCheatDrag(true);
    } else if (key === "Escape" && cheatSelection.length) {
      event.preventDefault();
      clearCheatSelection();
      showCheatToast("已取消水果选择");
    } else if (key === "Escape" && pathOpen) {
      event.preventDefault();
      setPathPanelOpen(false);
    } else if (key === "ArrowLeft" || key === "a" || key === "A") {
      event.preventDefault();
      moveAimBy(-KEYBOARD_AIM_STEP);
    } else if (key === "ArrowRight" || key === "d" || key === "D") {
      event.preventDefault();
      moveAimBy(KEYBOARD_AIM_STEP);
    } else if (key === " " || key === "Enter") {
      event.preventDefault();
      audio.unlock();
      dropCurrentFruit();
    } else if (key === "r" || key === "R") {
      event.preventDefault();
      audio.unlock();
      audio.playButton();
      resetGame();
    } else if (key === "m" || key === "M") {
      event.preventDefault();
      audio.unlock();
      audio.setMuted(!audio.muted);
      updateSoundButton();
      if (!audio.muted) {
        audio.playButton();
      }
    }
  }

  function resize() {
    dpr = Math.max(1, Math.min(MAX_CANVAS_DPR, window.devicePixelRatio || 1));
    if (!isMobilePathMode()) {
      setPathPanelOpen(false);
    }
    stageRect = canvas.parentElement.getBoundingClientRect();
    canvas.width = Math.round(stageRect.width * dpr);
    canvas.height = Math.round(stageRect.height * dpr);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(canvas.width / W, canvas.height / H);
    if (GALLERY_MODE) {
      drawFruitGallery(performance.now());
    }
  }

  function isMobilePathMode() {
    return MOBILE_PATH_QUERY && MOBILE_PATH_QUERY.matches;
  }

  function setPathPanelOpen(open) {
    pathOpen = !!open && isMobilePathMode();
    if (gameShell) {
      gameShell.classList.toggle("is-path-open", pathOpen);
    }
    if (nextPill) {
      nextPill.setAttribute("aria-expanded", pathOpen ? "true" : "false");
      nextPill.setAttribute("aria-label", (pathOpen ? "收起" : "展开") + "合成路径");
    }
  }

  function registerCheatTap() {
    const now = performance.now();
    const previousTap = cheatTapTimes.length ? cheatTapTimes[cheatTapTimes.length - 1] : 0;
    if (previousTap && now - previousTap > CHEAT_TAP_GAP) {
      cheatTapTimes = [];
    }
    cheatTapTimes = cheatTapTimes.filter(function (time) {
      return now - time <= CHEAT_TAP_WINDOW;
    });
    cheatTapTimes.push(now);

    if (cheatTapTimes.length === CHEAT_CATALOG_TAP_COUNT) {
      cheatTapTimes = [];
      setCheatMode(2);
    } else if (cheatTapTimes.length === CHEAT_TAP_COUNT) {
      if (cheatModeLevel === 0) {
        setCheatMode(1);
      } else {
        cheatTapTimes = [];
        setCheatMode(0);
      }
    }
  }

  function setCheatMode(level) {
    cancelCheatDrag(true);
    cancelCatalogDrag();
    clearCheatSelection();
    cheatModeLevel = clamp(Math.round(level || 0), 0, 2);
    cheatMode = cheatModeLevel > 0;
    gameShell.classList.toggle("is-cheat-mode", cheatMode);
    gameShell.classList.toggle("is-catalog-mode", cheatModeLevel === 2);
    brandSub.textContent = cheatModeLevel === 2 ? "果库搬运" : (cheatMode ? "自由搬运" : "果香轻落");
    updateFruitProgress();
    audio.unlock();
    audio.playButton();
    if (cheatModeLevel === 2) {
      showCheatToast("果库模式已开启 · 从合成路径拖入任意水果");
    } else if (cheatModeLevel === 1) {
      showCheatToast("自由搬运已开启 · 继续点到 14 次可开启果库");
    } else {
      setPathPanelOpen(false);
      showCheatToast("作弊模式已关闭");
    }
  }

  function showCheatToast(message) {
    if (!cheatToast) return;
    cheatToast.textContent = message;
    cheatToast.classList.add("is-visible");
    if (cheatToastTimer) {
      window.clearTimeout(cheatToastTimer);
    }
    cheatToastTimer = window.setTimeout(function () {
      cheatToast.classList.remove("is-visible");
      cheatToastTimer = null;
    }, 2300);
  }

  function pointerToWorld(event) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (event.clientX - rect.left) / rect.width * W,
      y: (event.clientY - rect.top) / rect.height * H
    };
  }

  function pickCheatFruit(point) {
    let picked = null;
    let bestDistance = Infinity;
    for (const fruit of entities.values()) {
      if (fruit.removed || fruit.merging || fruit.cheatDragging) continue;
      const r = fruits[fruit.level].r;
      const dx = point.x - fruit.body.position.x;
      const dy = point.y - fruit.body.position.y;
      const distance = Math.hypot(dx, dy);
      const hitRadius = r + (IS_TOUCH_DEVICE ? 14 : 6);
      if (distance <= hitRadius && distance / Math.max(1, r) < bestDistance) {
        picked = fruit;
        bestDistance = distance / Math.max(1, r);
      }
    }
    return picked;
  }

  function beginCheatDrag(event) {
    if (!cheatMode || gameOver) return false;
    const point = pointerToWorld(event);
    const fruit = pickCheatFruit(point);
    if (!fruit) return false;

    const body = fruit.body;
    cheatDrag = {
      fruit: fruit,
      pointerId: event.pointerId,
      startPoint: point,
      startPosition: { x: body.position.x, y: body.position.y },
      lastValid: { x: body.position.x, y: body.position.y },
      attempted: { x: body.position.x, y: body.position.y },
      offsetX: body.position.x - point.x,
      offsetY: body.position.y - point.y,
      moved: false,
      valid: true,
      mergeTarget: null
    };
    fruit.cheatDragging = true;
    Sleeping.set(body, false);
    Body.setVelocity(body, { x: 0, y: 0 });
    Body.setAngularVelocity(body, 0);
    Body.setStatic(body, true);
    gameShell.classList.add("is-cheat-dragging");
    if (canvas.setPointerCapture && event.pointerId !== undefined) {
      canvas.setPointerCapture(event.pointerId);
    }
    return true;
  }

  function moveCheatDrag(event) {
    if (!cheatDrag || (event.pointerId !== undefined && event.pointerId !== cheatDrag.pointerId)) return;
    event.preventDefault();
    const drag = cheatDrag;
    const fruit = drag.fruit;
    if (!fruit || fruit.removed) {
      cancelCheatDrag(false);
      return;
    }

    const point = pointerToWorld(event);
    if (!drag.moved && Math.hypot(point.x - drag.startPoint.x, point.y - drag.startPoint.y) >= CHEAT_DRAG_THRESHOLD) {
      drag.moved = true;
      clearCheatSelection();
    }
    if (!drag.moved) return;

    const r = fruits[fruit.level].r;
    const target = {
      x: clamp(point.x + drag.offsetX, LEFT_X + r + 3, RIGHT_X - r - 3),
      y: clamp(point.y + drag.offsetY, CHEAT_TOP_Y + r, FLOOR_Y - r - 3)
    };
    const result = inspectCheatTarget(fruit, target.x, target.y);
    drag.attempted = target;
    drag.valid = result.valid;
    drag.mergeTarget = result.mergeTarget;

    if (result.valid) {
      Body.setPosition(fruit.body, target);
      Body.setVelocity(fruit.body, { x: 0, y: 0 });
      drag.lastValid = { x: target.x, y: target.y };
    }
  }

  function inspectCheatTarget(fruit, x, y) {
    return inspectFruitPlacement(fruit.level, x, y, fruit);
  }

  function inspectFruitPlacement(level, x, y, excludedFruit) {
    const r = fruits[level].r;
    let mergeTarget = null;
    let mergeDistance = Infinity;
    for (const other of entities.values()) {
      if (other === excludedFruit || other.removed || other.merging || other.cheatDragging) continue;
      const otherR = fruits[other.level].r;
      const distance = Math.hypot(x - other.body.position.x, y - other.body.position.y);
      const conflictDistance = r + otherR + CHEAT_COLLISION_PAD;
      if (distance >= conflictDistance) continue;

      const canMerge = level === other.level && level < fruits.length - 1
        && distance <= r + otherR + CHEAT_MERGE_PAD;
      if (!canMerge) {
        return { valid: false, mergeTarget: null };
      }
      if (distance < mergeDistance) {
        mergeTarget = other;
        mergeDistance = distance;
      }
    }
    return { valid: true, mergeTarget: mergeTarget };
  }

  function beginCatalogDrag(event, level, sourceElement) {
    if (cheatModeLevel !== 2 || gameOver) return;
    event.preventDefault();
    audio.unlock();
    cancelCatalogDrag();
    catalogDrag = {
      level: level,
      pointerId: event.pointerId,
      sourceElement: sourceElement
    };
    sourceElement.classList.add("is-catalog-dragging");
    gameShell.classList.add("is-catalog-dragging");
    catalogGhostFruit.style.setProperty("--fruit-a", fruits[level].a);
    catalogGhostFruit.style.setProperty("--fruit-b", fruits[level].b);
    catalogGhostName.textContent = fruits[level].name;
    catalogDragGhost.classList.add("is-visible");
    moveCatalogGhost(event.clientX, event.clientY);
    if (sourceElement.setPointerCapture && event.pointerId !== undefined) {
      sourceElement.setPointerCapture(event.pointerId);
    }
  }

  function moveCatalogDrag(event) {
    if (!catalogDrag || (event.pointerId !== undefined && event.pointerId !== catalogDrag.pointerId)) return;
    event.preventDefault();
    moveCatalogGhost(event.clientX, event.clientY);
  }

  function moveCatalogGhost(clientX, clientY) {
    if (!catalogDragGhost) return;
    catalogDragGhost.style.left = clientX + "px";
    catalogDragGhost.style.top = clientY + "px";
  }

  function finishCatalogDrag(event, commit) {
    if (!catalogDrag || (event.pointerId !== undefined && event.pointerId !== catalogDrag.pointerId)) return false;
    event.preventDefault();
    const drag = catalogDrag;
    const canvasRect = canvas.getBoundingClientRect();
    const insideCanvas = event.clientX >= canvasRect.left && event.clientX <= canvasRect.right
      && event.clientY >= canvasRect.top && event.clientY <= canvasRect.bottom;
    cancelCatalogDrag();
    if (!commit || !insideCanvas) return true;

    const level = drag.level;
    const r = fruits[level].r;
    const target = {
      x: clamp((event.clientX - canvasRect.left) / canvasRect.width * W, LEFT_X + r + 3, RIGHT_X - r - 3),
      y: clamp((event.clientY - canvasRect.top) / canvasRect.height * H, CHEAT_TOP_Y + r, FLOOR_Y - r - 3)
    };
    const result = inspectFruitPlacement(level, target.x, target.y, null);
    if (!result.valid) {
      showCheatToast("该位置与其他水果冲突");
      return true;
    }

    const now = performance.now();
    const fruit = addFruit(level, target.x, target.y, { vx: 0, vy: 0 });
    fruit.bornAt = now - MERGE_READY_MS - 1;
    fruit.squash = 0.22;
    if (result.mergeTarget && tryMerge(fruit, result.mergeTarget, now)) {
      showCheatToast("已拖入并直接合成" + fruits[level + 1].name);
    } else {
      showCheatToast("已从果库放入" + fruits[level].name);
    }
    if (isMobilePathMode()) {
      setPathPanelOpen(false);
    }
    wakeAllDynamicFruits();
    return true;
  }

  function cancelCatalogDrag() {
    if (!catalogDrag) return;
    const drag = catalogDrag;
    if (drag.sourceElement) {
      drag.sourceElement.classList.remove("is-catalog-dragging");
      if (drag.sourceElement.releasePointerCapture && drag.pointerId !== undefined) {
        try {
          drag.sourceElement.releasePointerCapture(drag.pointerId);
        } catch (error) {
          // Pointer capture may already have been released by the browser.
        }
      }
    }
    catalogDrag = null;
    gameShell.classList.remove("is-catalog-dragging");
    if (catalogDragGhost) {
      catalogDragGhost.classList.remove("is-visible");
    }
  }

  function finishCheatDrag(event, commit) {
    if (!cheatDrag || (event.pointerId !== undefined && event.pointerId !== cheatDrag.pointerId)) return false;
    event.preventDefault();
    const drag = cheatDrag;
    const fruit = drag.fruit;
    const wasTap = !drag.moved;

    if (canvas.releasePointerCapture && event.pointerId !== undefined) {
      try {
        canvas.releasePointerCapture(event.pointerId);
      } catch (error) {
        // Pointer capture may already have been released by the browser.
      }
    }

    if (fruit && !fruit.removed) {
      if (!commit) {
        Body.setPosition(fruit.body, drag.startPosition);
      } else if (!drag.valid) {
        Body.setPosition(fruit.body, drag.lastValid);
      }
      Body.setStatic(fruit.body, false);
      Sleeping.set(fruit.body, false);
      Body.setVelocity(fruit.body, { x: 0, y: 0 });
      Body.setAngularVelocity(fruit.body, 0);
      fruit.cheatDragging = false;
    }

    cheatDrag = null;
    gameShell.classList.remove("is-cheat-dragging");
    if (drag.moved) {
      wakeAllDynamicFruits();
    }

    if (!commit || !fruit || fruit.removed) return true;
    if (wasTap) {
      selectCheatFruit(fruit);
      return true;
    }
    if (drag.mergeTarget && !drag.mergeTarget.removed && !drag.mergeTarget.merging) {
      const now = performance.now();
      fruit.bornAt = now - MERGE_READY_MS - 1;
      drag.mergeTarget.bornAt = now - MERGE_READY_MS - 1;
      if (tryMerge(fruit, drag.mergeTarget, now)) {
        showCheatToast("同级水果已直接合成");
      }
    } else if (!drag.valid) {
      showCheatToast("该位置与其他水果冲突");
    }
    return true;
  }

  function cancelCheatDrag(restoreStart) {
    if (!cheatDrag) return;
    const drag = cheatDrag;
    const fruit = drag.fruit;
    if (canvas.releasePointerCapture && drag.pointerId !== undefined) {
      try {
        canvas.releasePointerCapture(drag.pointerId);
      } catch (error) {
        // Pointer capture may already have been released by the browser.
      }
    }
    if (fruit && !fruit.removed) {
      Body.setPosition(fruit.body, restoreStart ? drag.startPosition : drag.lastValid);
      Body.setStatic(fruit.body, false);
      Sleeping.set(fruit.body, false);
      Body.setVelocity(fruit.body, { x: 0, y: 0 });
      Body.setAngularVelocity(fruit.body, 0);
      fruit.cheatDragging = false;
    }
    cheatDrag = null;
    gameShell.classList.remove("is-cheat-dragging");
    wakeAllDynamicFruits();
  }

  function clearCheatSelection() {
    for (const fruit of cheatSelection) {
      if (fruit) fruit.cheatSelected = false;
    }
    cheatSelection = [];
  }

  function selectCheatFruit(fruit) {
    cheatSelection = cheatSelection.filter(function (item) {
      return item && !item.removed && !item.merging;
    });
    if (fruit.level >= fruits.length - 1) {
      showCheatToast("大西瓜已经是最高级");
      return;
    }

    const existingIndex = cheatSelection.indexOf(fruit);
    if (existingIndex >= 0) {
      fruit.cheatSelected = false;
      cheatSelection.splice(existingIndex, 1);
      showCheatToast("已取消选择 · " + cheatSelection.length + "/3");
      return;
    }

    if (cheatSelection.length && cheatSelection[0].level !== fruit.level) {
      clearCheatSelection();
    }
    fruit.cheatSelected = true;
    cheatSelection.push(fruit);
    if (cheatSelection.length >= 3) {
      forceTripleCheatMerge(cheatSelection.slice(0, 3));
    } else {
      showCheatToast("已选择" + fruits[fruit.level].name + " · " + cheatSelection.length + "/3");
    }
  }

  function forceTripleCheatMerge(group) {
    if (group.length !== 3) return false;
    const level = group[0].level;
    if (level >= fruits.length - 1 || group.some(function (fruit) {
      return !fruit || fruit.removed || fruit.merging || fruit.level !== level;
    })) {
      clearCheatSelection();
      return false;
    }

    const now = performance.now();
    const next = level + 1;
    const nextR = fruits[next].r;
    let x = 0;
    let y = 0;
    let vx = 0;
    let vy = 0;
    for (const fruit of group) {
      fruit.merging = true;
      fruit.cheatSelected = false;
      x += fruit.body.position.x;
      y += fruit.body.position.y;
      vx += fruit.body.velocity.x || 0;
      vy += fruit.body.velocity.y || 0;
    }
    x = clamp(x / 3, LEFT_X + nextR + 3, RIGHT_X - nextR - 3);
    y = clamp(y / 3, DANGER_Y + nextR * 0.45, FLOOR_Y - nextR - 4);
    vx *= 0.08;
    vy = vy * 0.06 - 0.45;

    comboCount = now - lastComboAt < 920 ? comboCount + 1 : 1;
    lastComboAt = now;
    spawnMergeParticles(x, y, next, mergeSerial++);
    clearCheatSelection();
    for (const fruit of group) {
      removeFruit(fruit);
    }

    window.setTimeout(function () {
      if (gameOver) return;
      const fruit = addFruit(next, x, y, { vx: vx, vy: vy });
      fruit.happyUntil = performance.now() + 980;
      fruit.mood = "happy";
      fruit.squash = 0.62;
      const earned = fruits[next].score;
      score += earned;
      scoreEl.textContent = String(score);
      if (next > highestLevel) {
        highestLevel = next;
        updateFruitProgress();
      }
      spawnFloatingText(x, y - nextR * 0.38, "+" + earned + "  三果升级", "combo");
      if (score > bestScore) {
        bestScore = score;
        bestEl.textContent = String(bestScore);
        localStorage.setItem(STORAGE_KEY, String(bestScore));
      }
      audio.playMerge(next);
      if (next === fruits.length - 1) {
        registerWatermelonAchievement(fruit);
      }
      showCheatToast("三枚" + fruits[level].name + "已升级为" + fruits[next].name);
    }, 36);
    return true;
  }

  function registerWatermelonAchievement(fruit) {
    watermelonAchievements += 1;
    const count = watermelonAchievements;
    localStorage.setItem(WATERMELON_COUNT_KEY, String(count));
    watermelonCountEl.textContent = String(count);
    watermelonTrophy.setAttribute("aria-label", "已合成大西瓜 " + count + " 个");

    audio.duckMusic();
    audio.playClear();
    if (fruit && !fruit.removed) {
      spawnMergeParticles(fruit.body.position.x, fruit.body.position.y, fruit.level, mergeSerial++);
      spawnMergeParticles(fruit.body.position.x, fruit.body.position.y, fruit.level, mergeSerial++);
    }

    clearCopy.textContent = count === 1
      ? "恭喜通关，果园仍可继续"
      : "历史累计第 " + count + " 个，继续慢慢合成吧";
    clearBanner.classList.remove("is-visible");
    void clearBanner.offsetWidth;
    clearBanner.classList.add("is-visible");
    if (clearBannerTimer) {
      window.clearTimeout(clearBannerTimer);
    }
    clearBannerTimer = window.setTimeout(function () {
      clearBanner.classList.remove("is-visible");
      clearBannerTimer = null;
    }, 3000);

    watermelonTrophy.classList.remove("is-visible");
    void watermelonTrophy.offsetWidth;
    if (trophyPulseTimer) {
      window.clearTimeout(trophyPulseTimer);
    }
    trophyPulseTimer = window.setTimeout(function () {
      watermelonTrophy.classList.add("is-visible");
      trophyPulseTimer = null;
    }, 1250);
  }

  function updateAim(event) {
    stageRect = stageRect || canvas.getBoundingClientRect();
    const rect = canvas.getBoundingClientRect();
    const rawX = (event.clientX - rect.left) / rect.width * W;
    setAimX(rawX, 0.9);
  }

  function moveAimBy(delta) {
    setAimX(aimX + delta, 1);
  }

  function setAimX(rawX, ease) {
    const currentR = fruits[currentLevel].r;
    const target = clamp(rawX, LEFT_X + currentR + 4, RIGHT_X - currentR - 4);
    aimX += (target - aimX) * ease;
  }

  function dropCurrentFruit() {
    const now = performance.now();
    if (gameOver || !canDrop || now - lastDropAt < DROP_COOLDOWN) {
      return;
    }
    lastDropAt = now;
    canDrop = false;
    const fruit = addFruit(currentLevel, aimX, SPAWN_Y, {
      newborn: true,
      vx: (Math.random() - 0.5) * 0.18,
      vy: 0.45
    });
    fruit.mood = "drop";
    fruit.squash = 0.22;
    currentLevel = nextLevel;
    nextLevel = randomStartLevel();
    updateNextFruitUi();
    audio.playDrop(fruit.level);
    window.setTimeout(function () {
      canDrop = !gameOver;
    }, DROP_COOLDOWN);
  }

  function addFruit(level, x, y, options) {
    options = options || {};
    const def = fruits[level];
    const body = Bodies.circle(x, y, def.r, {
      label: "fruit-" + def.key,
      restitution: 0.105,
      friction: 0.82,
      frictionStatic: 0.92,
      frictionAir: 0.014,
      density: 0.00062 + level * 0.000018,
      slop: 0.045
    });
    const fruit = {
      id: body.id,
      level: level,
      body: body,
      bornAt: performance.now(),
      lastSoundAt: 0,
      lastMergeAt: 0,
      removed: false,
      merging: false,
      cheatDragging: false,
      cheatSelected: false,
      mood: "idle",
      squash: options.newborn ? 0.18 : 0.36,
      wobble: Math.random() * Math.PI * 2,
      detailSeed: Math.random() * Math.PI * 2,
      blinkAt: performance.now() + 1200 + Math.random() * 2600,
      happyUntil: 0,
      dangerUntil: 0,
      visualAngle: body.angle || 0,
      visualSpin: 0,
      pop: options.newborn ? 0.2 : 0.95
    };
    body.fruit = fruit;
    World.add(engine.world, body);
    if (options.vx || options.vy) {
      Body.setVelocity(body, { x: options.vx || 0, y: options.vy || 0 });
    }
    entities.set(body.id, fruit);
    return fruit;
  }

  function tryMerge(a, b, now) {
    if (a.removed || b.removed || a.merging || b.merging) {
      return false;
    }
    if (a.level !== b.level || a.level >= fruits.length - 1) {
      return false;
    }
    if (now - a.bornAt < MERGE_READY_MS || now - b.bornAt < MERGE_READY_MS) {
      return false;
    }

    a.merging = true;
    b.merging = true;
    a.lastMergeAt = now;
    b.lastMergeAt = now;

    const ax = a.body.position.x;
    const ay = a.body.position.y;
    const bx = b.body.position.x;
    const by = b.body.position.y;
    const next = a.level + 1;
    const nextR = fruits[next].r;
    const x = clamp((ax + bx) / 2, LEFT_X + nextR + 3, RIGHT_X - nextR - 3);
    const y = clamp((ay + by) / 2, DANGER_Y + nextR * 0.45, FLOOR_Y - nextR - 4);
    const vx = (a.body.velocity.x + b.body.velocity.x) * 0.24;
    const vy = (a.body.velocity.y + b.body.velocity.y) * 0.18 - 0.65;
    const serial = mergeSerial++;
    comboCount = now - lastComboAt < 920 ? comboCount + 1 : 1;
    lastComboAt = now;

    spawnMergeParticles(x, y, next, serial);
    removeFruit(a);
    removeFruit(b);

    window.setTimeout(function () {
      if (gameOver) {
        return;
      }
      const fruit = addFruit(next, x, y, { vx: vx, vy: vy });
      fruit.happyUntil = performance.now() + 860;
      fruit.mood = "happy";
      fruit.squash = 0.56;
      const earned = fruits[next].score;
      score += earned;
      scoreEl.textContent = String(score);
      if (next > highestLevel) {
        highestLevel = next;
        updateFruitProgress();
      }
      spawnFloatingText(x, y - nextR * 0.35, "+" + earned + (comboCount > 1 ? "  x" + comboCount : ""), comboCount > 1 ? "combo" : "score");
      if (score > bestScore) {
        bestScore = score;
        bestEl.textContent = String(bestScore);
        localStorage.setItem(STORAGE_KEY, String(bestScore));
      }
      audio.playMerge(next);
      if (next === fruits.length - 1) {
        registerWatermelonAchievement(fruit);
      }
    }, 36);
    return true;
  }

  function removeFruit(fruit) {
    if (cheatDrag && cheatDrag.fruit === fruit) {
      cheatDrag = null;
      gameShell.classList.remove("is-cheat-dragging");
    }
    fruit.cheatDragging = false;
    fruit.cheatSelected = false;
    cheatSelection = cheatSelection.filter(function (item) {
      return item !== fruit;
    });
    fruit.removed = true;
    entities.delete(fruit.id);
    World.remove(engine.world, fruit.body);
    fruit.body.fruit = null;
  }

  function resetGame() {
    cancelCheatDrag(false);
    cancelCatalogDrag();
    clearCheatSelection();
    for (const fruit of Array.from(entities.values())) {
      removeFruit(fruit);
    }
    particles = [];
    floaters = [];
    score = 0;
    dangerTime = 0;
    gameOver = false;
    canDrop = true;
    lastDropAt = -9999;
    physicsAccumulator = 0;
    supportCheckElapsed = 0;
    watermelonCountEl.textContent = String(watermelonAchievements);
    watermelonTrophy.classList.toggle("is-visible", watermelonAchievements > 0);
    clearBanner.classList.remove("is-visible");
    if (clearBannerTimer) {
      window.clearTimeout(clearBannerTimer);
      clearBannerTimer = null;
    }
    if (trophyPulseTimer) {
      window.clearTimeout(trophyPulseTimer);
      trophyPulseTimer = null;
    }
    currentLevel = randomStartLevel();
    nextLevel = randomStartLevel();
    highestLevel = Math.max(currentLevel, nextLevel);
    comboCount = 0;
    lastComboAt = -9999;
    aimX = W / 2;
    scoreEl.textContent = "0";
    updateNextFruitUi();
    updateFruitProgress();
    overlay.classList.remove("is-visible");
    audio.startMusic();
  }

  function endGame() {
    if (gameOver) {
      return;
    }
    cancelCheatDrag(false);
    cancelCatalogDrag();
    clearCheatSelection();
    gameOver = true;
    canDrop = false;
    resultScore.textContent = String(score);
    resultBest.textContent = String(bestScore);
    overlay.classList.add("is-visible");
    audio.playGameOver();
    audio.duckMusic();
  }

  async function runSelfTest() {
    const tests = [];
    const note = function (name, pass, detail) {
      tests.push({ name: name, pass: !!pass, detail: detail || "" });
    };

    try {
      note("fruit-count", fruits.length === 11, "levels=" + fruits.length);
      const colorInfo = minFruitColorDistance();
      note("fruit-color-distance", colorInfo.distance >= 38, colorInfo.pair + " " + colorInfo.distance.toFixed(1));
      note("ui-progress-pips", progressPips.length === fruits.length && (!fruitProgressEl || fruitProgressEl.children.length === fruits.length), "pips=" + progressPips.length);
      note("next-fruit-ui", !nextFruitName || nextFruitName.textContent === fruits[nextLevel].name, nextFruitName ? nextFruitName.textContent : "missing");
      note("audio-api", ["unlock", "playDrop", "playCollision", "playMerge", "playButton", "playGameOver", "duckMusic"].every(function (key) {
        return typeof audio[key] === "function";
      }));

      for (const fruit of Array.from(entities.values())) {
        removeFruit(fruit);
      }
      particles = [];
      floaters = [];
      score = 0;
      scoreEl.textContent = "0";

      const oldGrape = addFruit(2, 250, 520, {});
      const strawberryA = addFruit(1, 205, 520, {});
      const strawberryB = addFruit(1, 251, 520, {});
      oldGrape.bornAt = 0;
      strawberryA.bornAt = 0;
      strawberryB.bornAt = 0;

      const initialMerge = tryMerge(strawberryA, strawberryB, performance.now() + 1000);
      await wait(70);
      const afterFirst = Array.from(entities.values()).map(function (fruit) { return fruit.level; }).sort(function (a, b) { return a - b; });
      for (const fruit of entities.values()) {
        fruit.bornAt = 0;
      }
      resolveTouchingSameLevel(performance.now() + 1400);
      await wait(70);
      const afterChain = Array.from(entities.values()).map(function (fruit) { return fruit.level; }).sort(function (a, b) { return a - b; });
      note("chain-merge", initialMerge && afterFirst.join(",") === "2,2" && afterChain.join(",") === "3", afterFirst.join(",") + " -> " + afterChain.join(","));
      note("floating-feedback", floaters.length > 0, "floaters=" + floaters.length);
    } catch (error) {
      note("selftest-runtime", false, error && error.message ? error.message : String(error));
    }

    const passed = tests.filter(function (test) { return test.pass; }).length;
    const result = {
      ok: passed === tests.length,
      passed: passed,
      total: tests.length,
      tests: tests
    };
    window.__healingWatermelonSelfTest = result;
    if (document.body) {
      document.body.dataset.selftest = result.ok ? "pass" : "fail";
    }

    resetGame();
    showSelfTestResult(result);
    if (!result.ok) {
      console.error("Healing Watermelon self test failed", result);
    }
  }

  function showSelfTestResult(result) {
    resultScore.textContent = "通过 " + result.passed + " / " + result.total;
    resultBest.textContent = result.ok ? "核心检查正常" : "请查看控制台";
    const title = overlay.querySelector ? overlay.querySelector(".result-title") : null;
    if (title) {
      title.textContent = result.ok ? "自检通过" : "自检失败";
    }
    playAgainBtn.textContent = "进入游戏";
    playAgainBtn.addEventListener("click", function () {
      if (!gameOver && SELF_TEST_MODE) {
        requestAnimationFrame(loop);
      }
    }, { once: true });
    overlay.classList.add("is-visible");
  }

  function runFruitGallery() {
    for (const fruit of Array.from(entities.values())) {
      removeFruit(fruit);
    }
    particles = [];
    floaters = [];
    overlay.classList.remove("is-visible");
    drawFruitGallery(performance.now());
    window.__healingWatermelonGallery = {
      levels: fruits.length,
      fruits: fruits.map(function (fruit) {
        return {
          key: fruit.key,
          name: fruit.name,
          radius: fruit.r,
          color: fruit.a
        };
      })
    };
  }

  function drawFruitGallery(now) {
    ctx.save();
    ctx.setTransform(canvas.width / W, 0, 0, canvas.height / H, 0, 0);
    drawSceneBackground(now);

    ctx.save();
    ctx.fillStyle = "rgba(255, 253, 244, 0.72)";
    ctx.strokeStyle = "rgba(77, 96, 79, 0.12)";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    roundedRectPath(36, 34, 408, 626, 16);
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "rgba(49, 64, 59, 0.92)";
    ctx.font = "900 22px Microsoft YaHei, Segoe UI, system-ui, sans-serif";
    ctx.fillText("合成大西瓜 · 果盘", W / 2, 65);
    ctx.fillStyle = "rgba(123, 139, 128, 0.86)";
    ctx.font = "800 12px Microsoft YaHei, Segoe UI, system-ui, sans-serif";
    ctx.fillText("同一套游戏内绘制 · 圆形碰撞体 · 水果特色在圆内呈现", W / 2, 91);
    ctx.restore();

    const slots = [
      [110, 154], [240, 154], [370, 154],
      [110, 284], [240, 284], [370, 284],
      [110, 414], [240, 414], [370, 414],
      [170, 552], [310, 552]
    ];

    for (let i = 0; i < fruits.length; i++) {
      const def = fruits[i];
      const slot = slots[i];
      const previewRadius = clamp(def.r * 0.58, 24, 50);

      ctx.save();
      ctx.fillStyle = "rgba(255,255,255,0.54)";
      ctx.strokeStyle = "rgba(72, 92, 78, 0.1)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      roundedRectPath(slot[0] - 52, slot[1] - 60, 104, 112, 12);
      ctx.fill();
      ctx.stroke();
      ctx.restore();

      drawTinyFruit(i, slot[0], slot[1] - 12, previewRadius, now + i * 140);

      ctx.save();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "rgba(49, 64, 59, 0.92)";
      ctx.font = "900 14px Microsoft YaHei, Segoe UI, system-ui, sans-serif";
      ctx.fillText(def.name, slot[0], slot[1] + 43);
      ctx.fillStyle = "rgba(123, 139, 128, 0.86)";
      ctx.font = "800 10px Microsoft YaHei, Segoe UI, system-ui, sans-serif";
      ctx.fillText("r " + def.r, slot[0], slot[1] + 59);
      ctx.restore();
    }

    ctx.restore();
  }

  function roundedRectPath(x, y, width, height, radius) {
    const r = Math.min(radius, width / 2, height / 2);
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + width - r, y);
    ctx.quadraticCurveTo(x + width, y, x + width, y + r);
    ctx.lineTo(x + width, y + height - r);
    ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
    ctx.lineTo(x + r, y + height);
    ctx.quadraticCurveTo(x, y + height, x, y + height - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function wait(ms) {
    return new Promise(function (resolve) {
      window.setTimeout(resolve, ms);
    });
  }

  function minFruitColorDistance() {
    let best = { distance: Infinity, pair: "" };
    for (let i = 0; i < fruits.length; i++) {
      for (let j = i + 1; j < fruits.length; j++) {
        const distance = colorDistance(fruits[i].a, fruits[j].a);
        if (distance < best.distance) {
          best = { distance: distance, pair: fruits[i].name + "/" + fruits[j].name };
        }
      }
    }
    return best;
  }

  function colorDistance(a, b) {
    const ca = hexToRgb(a);
    const cb = hexToRgb(b);
    return Math.hypot(ca.r - cb.r, ca.g - cb.g, ca.b - cb.b);
  }

  function hexToRgb(hex) {
    const value = hex.replace("#", "");
    return {
      r: parseInt(value.slice(0, 2), 16),
      g: parseInt(value.slice(2, 4), 16),
      b: parseInt(value.slice(4, 6), 16)
    };
  }

  function loop(now) {
    const delta = Math.min(MAX_FRAME_DELTA, now - lastFrame || FIXED_STEP);
    lastFrame = now;
    if (!gameOver) {
      physicsAccumulator = Math.min(physicsAccumulator + delta, FIXED_STEP * MAX_ACCUMULATED_STEPS);
      let steps = 0;
      while (physicsAccumulator >= FIXED_STEP && steps < MAX_ACCUMULATED_STEPS) {
        Engine.update(engine, FIXED_STEP);
        rescueInvalidPhysics();
        physicsAccumulator -= FIXED_STEP;
        steps++;
      }
      updateGame(delta, now);
    } else {
      updateFruitAnimations(delta, now);
      updateParticles(delta);
      updateFloaters(delta);
    }
    draw(now);
    requestAnimationFrame(loop);
  }

  function updateGame(delta, now) {
    updateFruitAnimations(delta, now);
    updateParticles(delta);
    updateFloaters(delta);
    resolveTouchingSameLevel(now);
    checkDanger(delta, now);
    keepFruitsInside();
    repairSuspendedFruits(delta);
  }

  function resolveTouchingSameLevel(now) {
    const active = Array.from(entities.values()).filter(function (fruit) {
      return !fruit.removed && !fruit.merging && !fruit.cheatDragging
        && fruit.level < fruits.length - 1 && now - fruit.bornAt >= MERGE_READY_MS;
    });

    for (let i = 0; i < active.length; i++) {
      const a = active[i];
      if (a.removed || a.merging) {
        continue;
      }
      const ar = fruits[a.level].r;
      for (let j = i + 1; j < active.length; j++) {
        const b = active[j];
        if (b.removed || b.merging || a.level !== b.level) {
          continue;
        }
        const br = fruits[b.level].r;
        const dx = a.body.position.x - b.body.position.x;
        const dy = a.body.position.y - b.body.position.y;
        const touchDistance = ar + br + MERGE_TOUCH_PAD;
        if (dx * dx + dy * dy <= touchDistance * touchDistance && tryMerge(a, b, now)) {
          break;
        }
      }
    }
  }

  function updateFruitAnimations(delta, now) {
    for (const fruit of entities.values()) {
      fruit.squash *= Math.pow(0.001, delta / 900);
      fruit.pop *= Math.pow(0.08, delta / 700);
      const angleDelta = wrapAngle((fruit.body.angle || 0) - (fruit.visualAngle || 0));
      fruit.visualSpin = clamp((fruit.visualSpin || 0) + angleDelta * 0.055, -0.11, 0.11);
      fruit.visualSpin *= Math.pow(0.82, delta / 16.67);
      fruit.visualAngle = (fruit.visualAngle || 0) + fruit.visualSpin * (delta / 16.67);
      if (now > fruit.blinkAt + 150) {
        fruit.blinkAt = now + 1500 + Math.random() * 3200;
      }
      if (fruit.happyUntil && now > fruit.happyUntil) {
        fruit.mood = "idle";
        fruit.happyUntil = 0;
      }
      if (fruit.dangerUntil && now > fruit.dangerUntil && fruit.mood === "danger") {
        fruit.mood = "idle";
      }
    }
  }

  function updateParticles(delta) {
    for (const p of particles) {
      p.age += delta;
      p.x += p.vx * delta / 16.67;
      p.y += p.vy * delta / 16.67;
      p.vy += 0.035 * delta / 16.67;
      p.spin += p.spinVel * delta / 16.67;
    }
    particles = particles.filter(function (p) {
      return p.age < p.life;
    });
  }

  function updateFloaters(delta) {
    for (const floater of floaters) {
      floater.age += delta;
      floater.y += floater.vy * delta / 16.67;
      floater.vy *= Math.pow(0.94, delta / 16.67);
    }
    floaters = floaters.filter(function (floater) {
      return floater.age < floater.life;
    });
  }

  function checkDanger(delta, now) {
    let isDanger = false;
    for (const fruit of entities.values()) {
      if (fruit.cheatDragging) {
        continue;
      }
      if (now - fruit.bornAt < 1250) {
        continue;
      }
      const top = fruit.body.position.y - fruits[fruit.level].r;
      if (top < DANGER_Y) {
        isDanger = true;
        fruit.mood = "danger";
        fruit.dangerUntil = now + 600;
      }
    }
    if (isDanger) {
      dangerTime += delta;
    } else {
      dangerTime = Math.max(0, dangerTime - delta * 2.2);
    }
    if (dangerTime > 1650) {
      endGame();
    }
  }

  function keepFruitsInside() {
    for (const fruit of entities.values()) {
      if (fruit.cheatDragging) continue;
      const body = fruit.body;
      const r = fruits[fruit.level].r;
      if (body.position.x < LEFT_X + r - 8) {
        Body.setPosition(body, { x: LEFT_X + r - 8, y: body.position.y });
        if (body.velocity.x < 0) {
          Body.setVelocity(body, { x: 0, y: body.velocity.y });
        }
      } else if (body.position.x > RIGHT_X - r + 8) {
        Body.setPosition(body, { x: RIGHT_X - r + 8, y: body.position.y });
        if (body.velocity.x > 0) {
          Body.setVelocity(body, { x: 0, y: body.velocity.y });
        }
      }
      if (body.position.y > FLOOR_Y - r + 8) {
        Body.setPosition(body, { x: body.position.x, y: FLOOR_Y - r + 8 });
        if (body.velocity.y > 0) {
          Body.setVelocity(body, { x: body.velocity.x, y: 0 });
        }
      }
    }
  }

  function wakeAllDynamicFruits() {
    for (const fruit of entities.values()) {
      if (fruit.removed || fruit.merging || fruit.cheatDragging) continue;
      if (fruit.body.isStatic) {
        Body.setStatic(fruit.body, false);
      }
      Sleeping.set(fruit.body, false);
    }
  }

  function repairSuspendedFruits(delta) {
    supportCheckElapsed += delta;
    if (supportCheckElapsed < SUPPORT_CHECK_INTERVAL) return;
    supportCheckElapsed = 0;

    for (const fruit of entities.values()) {
      if (fruit.removed || fruit.merging || fruit.cheatDragging) continue;
      const body = fruit.body;
      if (body.isStatic) {
        Body.setStatic(body, false);
        Sleeping.set(body, false);
      }
      const speed = Math.hypot(body.velocity.x || 0, body.velocity.y || 0);
      if (!body.isSleeping && speed > 0.08) continue;
      if (hasFruitSupport(fruit)) continue;

      Sleeping.set(body, false);
      Body.setVelocity(body, {
        x: (body.velocity.x || 0) * 0.35,
        y: Math.max(0.12, body.velocity.y || 0)
      });
    }
  }

  function hasFruitSupport(fruit) {
    const body = fruit.body;
    const r = fruits[fruit.level].r;
    if (body.position.y + r >= FLOOR_Y - 5) {
      return true;
    }
    for (const other of entities.values()) {
      if (other === fruit || other.removed || other.merging || other.cheatDragging) continue;
      const otherR = fruits[other.level].r;
      const dx = other.body.position.x - body.position.x;
      const dy = other.body.position.y - body.position.y;
      const contactDistance = r + otherR + 6;
      const minimumBelow = Math.max(3, r * 0.08);
      if (dy >= minimumBelow && dx * dx + dy * dy <= contactDistance * contactDistance) {
        return true;
      }
    }
    return false;
  }

  function rescueInvalidPhysics() {
    for (const fruit of entities.values()) {
      if (fruit.cheatDragging) continue;
      const body = fruit.body;
      const speed = Math.hypot(body.velocity.x || 0, body.velocity.y || 0);
      if (speed > CATASTROPHIC_SPEED) {
        const scale = CATASTROPHIC_SPEED / speed;
        Body.setVelocity(body, {
          x: body.velocity.x * scale,
          y: body.velocity.y * scale
        });
      }

      const angular = body.angularVelocity || 0;
      if (Math.abs(angular) > CATASTROPHIC_ANGULAR_SPEED) {
        Body.setAngularVelocity(body, Math.sign(angular) * CATASTROPHIC_ANGULAR_SPEED);
      }

      const r = fruits[fruit.level].r;
      if (body.position.x < LEFT_X + r - 18 || body.position.x > RIGHT_X - r + 18 || body.position.y > H + r) {
        Body.setPosition(body, {
          x: clamp(body.position.x, LEFT_X + r + 2, RIGHT_X - r - 2),
          y: Math.min(body.position.y, FLOOR_Y - r - 3)
        });
        Body.setVelocity(body, { x: 0, y: 0 });
        Body.setAngularVelocity(body, 0);
      }
    }
  }

  function draw(now) {
    ctx.save();
    ctx.setTransform(canvas.width / W, 0, 0, canvas.height / H, 0, 0);
    drawSceneBackground(now);
    drawBucket(now);

    const sorted = Array.from(entities.values()).sort(function (a, b) {
      return a.body.position.y - b.body.position.y;
    });
    for (const fruit of sorted) {
      drawFruit(fruit, now, 1);
    }

    drawCheatGuides(now);
    drawParticles();
    drawFloaters();
    if (!gameOver && !cheatDrag) {
      drawPreview(now);
    }
    drawDangerLine(now);
    ctx.restore();
  }

  function drawCheatGuides(now) {
    if (!cheatMode) return;
    ctx.save();
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    for (let i = 0; i < cheatSelection.length; i++) {
      const fruit = cheatSelection[i];
      if (!fruit || fruit.removed) continue;
      const r = fruits[fruit.level].r;
      const pos = fruit.body.position;
      ctx.globalAlpha = 0.78 + Math.sin(now / 180 + i) * 0.08;
      ctx.strokeStyle = "#e5a85c";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r + 7, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.fillStyle = "#fff9ed";
      ctx.beginPath();
      ctx.arc(pos.x + r * 0.68, pos.y - r * 0.68, 11, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(213, 111, 93, 0.46)";
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = "#9a5b4e";
      ctx.font = "900 11px 'Segoe UI', 'Microsoft YaHei', sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(String(i + 1), pos.x + r * 0.68, pos.y - r * 0.68 + 0.5);
    }

    if (cheatDrag && cheatDrag.fruit && !cheatDrag.fruit.removed) {
      const fruit = cheatDrag.fruit;
      const pos = fruit.body.position;
      const r = fruits[fruit.level].r;
      const color = cheatDrag.mergeTarget ? "#e3a24d" : (cheatDrag.valid ? "#68aa8b" : "#df7467");
      ctx.globalAlpha = 0.88;
      ctx.strokeStyle = color;
      ctx.lineWidth = 3;
      ctx.setLineDash([7, 6]);
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r + 8, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);

      if (cheatDrag.mergeTarget && !cheatDrag.mergeTarget.removed) {
        const target = cheatDrag.mergeTarget.body.position;
        const targetR = fruits[cheatDrag.mergeTarget.level].r;
        ctx.globalAlpha = 0.48;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        ctx.lineTo(target.x, target.y);
        ctx.stroke();
        ctx.globalAlpha = 0.9;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(target.x, target.y, targetR + 8, 0, Math.PI * 2);
        ctx.stroke();
      } else if (!cheatDrag.valid && cheatDrag.attempted) {
        ctx.globalAlpha = 0.42;
        ctx.strokeStyle = "#df7467";
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 6]);
        ctx.beginPath();
        ctx.arc(cheatDrag.attempted.x, cheatDrag.attempted.y, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }
    ctx.restore();
  }

  function drawSceneBackground(now) {
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, "#fff9ef");
    bg.addColorStop(0.5, "#fffdf6");
    bg.addColorStop(1, "#f8f0df");
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.globalAlpha = 0.28;
    ctx.strokeStyle = "#e9d9bd";
    ctx.lineWidth = 1;
    for (let x = -80; x < W + 80; x += 34) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x + 120, H);
      ctx.stroke();
    }
    ctx.restore();

    drawSoftLeaf(54, 54, 34, -0.7, "#bddc9c", 0.42);
    drawSoftLeaf(426, 78, 42, 0.8, "#9fd2bf", 0.35);
    drawSoftLeaf(62, 640, 46, 0.6, "#f2c58b", 0.28);
    drawSoftLeaf(415, 622, 38, -0.4, "#c8df96", 0.26);

    ctx.save();
    ctx.globalAlpha = 0.24 + Math.sin(now / 1800) * 0.03;

    glow.addColorStop(0, "rgba(255, 219, 138, 0.54)");

    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  function drawBucket(now) {
    const left = LEFT_X - 8;
    const right = RIGHT_X + 8;
    const top = 112;
    const bottom = FLOOR_Y + 6;

    ctx.save();
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    ctx.fillStyle = "rgba(255, 255, 255, 0.38)";
    roundRect(ctx, left, top, right - left, bottom - top, 24);
    ctx.fill();

    const wallGrad = ctx.createLinearGradient(left, top, right, top);
    wallGrad.addColorStop(0, "rgba(112, 155, 132, 0.58)");
    wallGrad.addColorStop(0.5, "rgba(255, 255, 255, 0.72)");
    wallGrad.addColorStop(1, "rgba(112, 155, 132, 0.58)");
    ctx.strokeStyle = wallGrad;
    ctx.lineWidth = 13;
    ctx.beginPath();
    ctx.moveTo(left, top + 14);
    ctx.lineTo(left, bottom - 16);
    ctx.quadraticCurveTo(left, bottom, left + 16, bottom);
    ctx.lineTo(right - 16, bottom);
    ctx.quadraticCurveTo(right, bottom, right, bottom - 16);
    ctx.lineTo(right, top + 14);
    ctx.stroke();

    ctx.strokeStyle = "rgba(78, 105, 88, 0.18)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(left + 7, top);
    ctx.lineTo(right - 7, top);
    ctx.stroke();

    ctx.restore();
  }

  function drawDangerLine(now) {
    const active = dangerTime > 0;
    ctx.save();
    ctx.globalAlpha = active ? 0.72 + Math.sin(now / 110) * 0.18 : 0.28;
    ctx.setLineDash([8, 10]);
    ctx.lineWidth = 2;
    ctx.strokeStyle = active ? "#f17465" : "#d7ad8e";
    ctx.beginPath();
    ctx.moveTo(LEFT_X + 12, DANGER_Y);
    ctx.lineTo(RIGHT_X - 12, DANGER_Y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = active ? "rgba(241, 116, 101, 0.72)" : "rgba(150, 119, 92, 0.34)";
    ctx.font = "800 12px 'Segoe UI', 'Microsoft YaHei', sans-serif";
    ctx.textAlign = "right";
    ctx.fillText("MAX", RIGHT_X - 14, DANGER_Y - 8);
    ctx.restore();
  }

  function drawPreview(now) {
    const def = fruits[currentLevel];
    const r = def.r;
    const wait = Math.min(1, Math.max(0, (now - lastDropAt) / DROP_COOLDOWN));
    const y = SPAWN_Y + Math.sin(now / 380) * 2.2;

    ctx.save();
    ctx.globalAlpha = 0.24 + wait * 0.2;
    ctx.strokeStyle = "#b3c6aa";
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 10]);
    ctx.beginPath();
    ctx.moveTo(aimX, y + r + 8);
    ctx.lineTo(aimX, FLOOR_Y - 10);
    ctx.stroke();
    ctx.restore();

    const ghost = {
      id: -1,
      level: currentLevel,
      body: {
        position: { x: aimX, y: y },
        angle: Math.sin(now / 500) * 0.05,
        velocity: { x: 0, y: 0 }
      },
      bornAt: now - 1000,
      squash: 0,
      wobble: 0,
      detailSeed: 1.2 + currentLevel * 0.37,
      blinkAt: now + 10000,
      mood: "idle",
      happyUntil: 0,
      visualAngle: Math.sin(now / 500) * 0.05,
      visualSpin: 0,
      pop: 0
    };
    drawFruit(ghost, now, 0.72);

    ctx.save();
    ctx.globalAlpha = 0.96;
    ctx.translate(aimX + r * 0.74, y - r * 0.66);
    drawTinyFruit(nextLevel, 0, 0, Math.max(12, def.r * 0.36), now);
    ctx.restore();
  }

  function drawFruitShadow(fruit, now, alpha) {
    const def = fruits[fruit.level];
    const body = fruit.body;
    const pos = body.position;
    const r = def.r;
    const speed = Math.hypot(body.velocity.x || 0, body.velocity.y || 0);
    const squash = clamp(fruit.squash + speed * 0.004, 0, 0.24);
    const width = r * (1.08 + squash * 0.72);
    const height = Math.max(4, r * (0.14 + squash * 0.05));
    const y = pos.y + r * (0.7 - squash * 0.1);
    const alphaBase = clamp(0.08 + r / 520 + speed * 0.004, 0.08, 0.2);

    ctx.save();
    ctx.globalAlpha = alpha * alphaBase;
    const grad = ctx.createRadialGradient(pos.x, y, 1, pos.x, y, width);
    grad.addColorStop(0, "rgba(69, 52, 38, 0.34)");
    grad.addColorStop(0.62, "rgba(69, 52, 38, 0.13)");
    grad.addColorStop(1, "rgba(69, 52, 38, 0)");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(pos.x, y, width, height, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawFruit(fruit, now, alpha) {
    const def = fruits[fruit.level];
    const body = fruit.body;
    const pos = body.position;
    const r = def.r;
    const age = now - fruit.bornAt;
    const speed = Math.hypot(body.velocity.x || 0, body.velocity.y || 0);
    const breathe = 1 + Math.sin(age / 880 + fruit.wobble) * 0.012;
    const squash = clamp(fruit.squash + speed * 0.004, 0, 0.28);
    const pop = fruit.pop ? Math.sin(Math.min(1, fruit.pop) * Math.PI) * 0.18 : 0;
    const sx = breathe * (1 + squash * 0.34 + pop);
    const sy = breathe * (1 - squash * 0.24 + pop * 0.28);
    const wobble = Math.sin(age / 160 + fruit.wobble) * clamp(speed / 18, 0, 0.08);

    ctx.save();
    ctx.globalAlpha *= alpha;
    ctx.translate(pos.x, pos.y);
    ctx.rotate((fruit.visualAngle || body.angle || 0) + wobble);
    ctx.scale(sx, sy);

    drawModelMatchedFruit(def, r, now, fruit);
    ctx.restore();
  }

  function drawModelMatchedFruit(def, r, now, fruit) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.clip();

    const grad = ctx.createRadialGradient(-r * 0.34, -r * 0.42, r * 0.08, 0, r * 0.08, r * 1.08);
    grad.addColorStop(0, lighten(def.a, 0.23));
    grad.addColorStop(0.52, def.a);
    grad.addColorStop(1, def.b);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();

    ctx.save();
    ctx.globalAlpha = 0.22;
    ctx.fillStyle = "#4a332b";
    ctx.beginPath();
    ctx.ellipse(r * 0.18, r * 0.66, r * 0.74, r * 0.18, -0.12, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    drawFruitFormCue(def, r);
    drawFruitDetail(def, r, now, fruit);
    drawFruitMicroDetails(def, r, now, fruit);
    drawFruitSurfaceLife(def, r, now, fruit);

    drawPersonaFace(def, fruit, r, now);

    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.ellipse(-r * 0.32, -r * 0.38, r * 0.18, r * 0.085, -0.65, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.restore();

    ctx.save();
    ctx.lineWidth = Math.max(2, r * 0.045);
    ctx.strokeStyle = "rgba(255,255,255,0.58)";
    ctx.beginPath();
    ctx.arc(0, 0, r - ctx.lineWidth * 0.45, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = "rgba(47, 54, 45, 0.08)";
    ctx.lineWidth = Math.max(1.5, r * 0.025);
    ctx.beginPath();
    ctx.arc(0, 0, r - ctx.lineWidth * 0.5, Math.PI * 0.1, Math.PI * 1.28);
    ctx.stroke();
    ctx.restore();
  }

    } else if (def.key === "melon") {
      ctx.strokeStyle = "rgba(255,250,208,0.25)";
      ctx.lineWidth = Math.max(1, r * 0.016);
      for (let i = -4; i <= 4; i++) {
        ctx.beginPath();
        ctx.moveTo(-r * 0.84, i * r * 0.16);
        ctx.quadraticCurveTo(0, i * r * 0.22 + Math.sin(i) * r * 0.04, r * 0.84, i * r * 0.16);
        ctx.stroke();
      }
    } else if (def.key === "watermelon") {
      ctx.fillStyle = "rgba(39,55,39,0.42)";
      for (let i = 0; i < 9; i++) {
        const a = i * 2.13;
        const d = r * (0.18 + (i % 3) * 0.17);
        const x = Math.cos(a) * d;
        const y = Math.sin(a) * d * 0.68 + r * 0.08;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(a + 0.5);
        ctx.beginPath();
        ctx.ellipse(0, 0, r * 0.025, r * 0.045, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      ctx.strokeStyle = "rgba(187,239,145,0.28)";
      ctx.lineWidth = Math.max(2, r * 0.024);
      for (let i = -2; i <= 2; i++) {
        ctx.beginPath();
        ctx.moveTo(i * r * 0.32 + r * 0.1, -r * 0.9);
        ctx.bezierCurveTo(i * r * 0.2, -r * 0.25, i * r * 0.36, r * 0.28, i * r * 0.22, r * 0.86);
        ctx.stroke();
      }
    }

    ctx.restore();
  }

  function drawFruitSurfaceLife(def, r, now, fruit) {
    const seed = fruit.detailSeed || 0;
    const drift = Math.sin(now / 1200 + seed) * r * 0.006;

    ctx.save();
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    drawSkinGlaze(r, seed);

    if (def.key === "cherry") {
      drawSoftLobeSeam(r, "rgba(114,22,47,0.22)", 0.16);
      drawTinySparkles(r, seed, 3, "rgba(255,255,255,0.42)");
    } else if (def.key === "strawberry") {
      drawRaisedSeeds(r, "rgba(255,239,167,0.82)", "rgba(126,42,44,0.18)", 12);
      drawTinySparkles(r, seed + 0.8, 2, "rgba(255,255,255,0.32)");
    } else if (def.key === "grape") {
      drawGrapeCellRims(r);
      drawTinySparkles(r, seed + 1.3, 4, "rgba(238,229,255,0.34)");
    } else if (def.key === "orange") {
      drawOrangeDimples(r, seed);
      drawCenterPulpGlow(r, "rgba(255,236,174,0.42)");
    } else if (def.key === "kiwi") {
      drawKiwiSeedHalo(r);
      drawFineRadials(r, "rgba(255,242,198,0.22)", 18, 0.18, 0.72);
    } else if (def.key === "apple") {
      drawSideBlush(r, "rgba(255,168,154,0.22)");
      drawLeafVein(r, def.accent);
      drawSoftLobeSeam(r, "rgba(110,20,30,0.18)", -0.1);
    } else if (def.key === "pear") {
      drawPearSpeckleClusters(r, seed);
      drawBottomStar(r, "rgba(111,91,44,0.2)");
    } else if (def.key === "peach") {
      drawPeachFuzz(r, seed);
      drawSideBlush(r, "rgba(255,198,177,0.24)");
    } else if (def.key === "pineapple") {
      drawPineappleStuds(r);
      drawLeafVein(r, def.accent);
    } else if (def.key === "melon") {
      drawNetKnots(r);
      drawTinySparkles(r, seed + 2.2, 3, "rgba(255,254,211,0.28)");
    } else if (def.key === "watermelon") {
      drawWatermelonSkinDepth(r);
      drawTinySparkles(r, seed + 2.7, 3, "rgba(207,255,170,0.22)");
    }

    ctx.save();
    ctx.globalAlpha = 0.12;
    ctx.strokeStyle = "rgba(255,255,255,0.9)";
    ctx.lineWidth = Math.max(1, r * 0.014);
    ctx.beginPath();
    ctx.arc(-r * 0.08 + drift, -r * 0.04, r * 0.78, Math.PI * 1.07, Math.PI * 1.55);
    ctx.stroke();
    ctx.restore();

    ctx.restore();
  }

  function drawSkinGlaze(r, seed) {
    ctx.save();
    const grad = ctx.createRadialGradient(-r * 0.42, -r * 0.48, r * 0.02, -r * 0.2, -r * 0.1, r * 0.92);
    grad.addColorStop(0, "rgba(255,255,255,0.2)");
    grad.addColorStop(0.42, "rgba(255,255,255,0.05)");
    grad.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 0.18;
    ctx.fillStyle = "#ffffff";
    for (let i = 0; i < 2; i++) {
      const a = seed + i * 1.7;
      ctx.beginPath();
      ctx.ellipse(-r * (0.34 + i * 0.08), -r * (0.38 - i * 0.07), r * (0.055 + i * 0.018), r * 0.022, a, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawSoftLobeSeam(r, color, tilt) {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(1.2, r * 0.022);
    ctx.beginPath();
    ctx.moveTo(r * (tilt || 0), -r * 0.68);
    ctx.bezierCurveTo(r * (0.18 + (tilt || 0)), -r * 0.2, r * (0.08 + (tilt || 0)), r * 0.38, -r * 0.16, r * 0.72);
    ctx.stroke();
    ctx.restore();
  }

  function drawTinySparkles(r, seed, count, color) {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(1, r * 0.014);
    for (let i = 0; i < count; i++) {
      const a = seed + i * 2.19;
      const d = r * (0.24 + (i % 3) * 0.16);
      const x = Math.cos(a) * d - r * 0.05;
      const y = Math.sin(a) * d * 0.82 - r * 0.08;
      if (x * x + y * y > r * r * 0.76) continue;
      ctx.beginPath();
      ctx.moveTo(x - r * 0.026, y);
      ctx.lineTo(x + r * 0.026, y);
      ctx.moveTo(x, y - r * 0.026);
      ctx.lineTo(x, y + r * 0.026);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawRaisedSeeds(r, fill, shadow, count) {
    ctx.save();
    for (let i = 0; i < count; i++) {
      const row = Math.floor(i / 4);
      const col = i % 4;
      const x = (col - 1.5 + (row % 2) * 0.4) * r * 0.18;
      const y = (row - 1.2) * r * 0.2 + r * 0.02;
      if (x * x + y * y > r * r * 0.54) continue;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(-0.35 + col * 0.1);
      ctx.fillStyle = shadow;
      ctx.beginPath();
      ctx.ellipse(r * 0.008, r * 0.012, r * 0.022, r * 0.04, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = fill;
      ctx.beginPath();
      ctx.ellipse(0, 0, r * 0.017, r * 0.034, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  }

  function drawGrapeCellRims(r) {
    ctx.save();
    ctx.strokeStyle = "rgba(47,34,97,0.16)";
    ctx.lineWidth = Math.max(1.1, r * 0.018);
    const cells = [
      [-0.2, -0.24, 0.24],
      [0.23, -0.18, 0.22],
      [-0.34, 0.16, 0.21],
      [0.12, 0.18, 0.25]
    ];
    for (const c of cells) {
      ctx.beginPath();
      ctx.arc(c[0] * r, c[1] * r, c[2] * r, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawOrangeDimples(r, seed) {
    ctx.save();
    ctx.fillStyle = "rgba(131,72,34,0.12)";
    for (let i = 0; i < 24; i++) {
      const a = seed + i * 2.399;
      const d = r * (0.18 + (i % 6) * 0.11);
      const x = Math.cos(a) * d;
      const y = Math.sin(a) * d * 0.92;
      if (x * x + y * y > r * r * 0.7) continue;
      ctx.beginPath();
      ctx.arc(x, y, Math.max(0.8, r * 0.011), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawCenterPulpGlow(r, color) {
    ctx.save();
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.08, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawKiwiSeedHalo(r) {
    ctx.save();
    ctx.fillStyle = "rgba(34,34,24,0.44)";
    for (let ring = 0; ring < 2; ring++) {
      const radius = r * (0.28 + ring * 0.12);
      const count = ring ? 22 : 16;
      for (let i = 0; i < count; i++) {
        const a = i * Math.PI * 2 / count + ring * 0.1;
        ctx.beginPath();
        ctx.ellipse(Math.cos(a) * radius, Math.sin(a) * radius, r * 0.011, r * 0.018, a, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.restore();
  }

  function drawFineRadials(r, color, count, from, to) {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(0.8, r * 0.01);
    for (let i = 0; i < count; i++) {
      const a = i * Math.PI * 2 / count;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * r * from, Math.sin(a) * r * from);
      ctx.lineTo(Math.cos(a) * r * to, Math.sin(a) * r * to);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawSideBlush(r, color) {
    ctx.save();
    const grad = ctx.createRadialGradient(-r * 0.46, r * 0.06, 0, -r * 0.42, r * 0.08, r * 0.34);
    grad.addColorStop(0, color);
    grad.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(-r * 0.36, r * 0.06, r * 0.36, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawLeafVein(r, color) {
    ctx.save();
    ctx.strokeStyle = "rgba(255,255,255,0.34)";
    ctx.lineWidth = Math.max(0.9, r * 0.012);
    ctx.beginPath();
    ctx.moveTo(r * 0.12, -r * 0.62);
    ctx.quadraticCurveTo(r * 0.19, -r * 0.67, r * 0.28, -r * 0.65);
    ctx.stroke();
    ctx.strokeStyle = color;
    ctx.globalAlpha = 0.18;
    ctx.beginPath();
    ctx.moveTo(r * 0.16, -r * 0.62);
    ctx.lineTo(r * 0.23, -r * 0.58);
    ctx.stroke();
    ctx.restore();

  function drawPearSpeckleClusters(r, seed) {
    ctx.save();
    ctx.fillStyle = "rgba(89,80,42,0.2)";
    for (let i = 0; i < 18; i++) {
      const a = seed + i * 2.08;
      const d = r * (0.18 + (i % 5) * 0.12);
      const x = Math.cos(a) * d;
      const y = Math.sin(a) * d * 0.72 + r * 0.05;
      if (x * x + y * y > r * r * 0.72) continue;
      ctx.beginPath();
      ctx.arc(x, y, r * (0.009 + (i % 3) * 0.003), 0, Math.PI * 2);

    }
    ctx.restore();
  }

  function drawBottomStar(r, color) {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(1, r * 0.013);
    const cx = 0;
    const cy = r * 0.58;
    for (let i = 0; i < 5; i++) {
      const a = i * Math.PI * 2 / 5;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(a) * r * 0.07, cy + Math.sin(a) * r * 0.04);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawPeachFuzz(r, seed) {
    ctx.save();
    ctx.strokeStyle = "rgba(255,238,226,0.22)";
    ctx.lineWidth = Math.max(0.8, r * 0.009);
    for (let i = 0; i < 18; i++) {
      const a = seed + i * 2.399;
      const d = r * (0.32 + (i % 4) * 0.12);
      const x = Math.cos(a) * d;
      const y = Math.sin(a) * d * 0.78;
      if (x * x + y * y > r * r * 0.76) continue;
      ctx.beginPath();
      ctx.moveTo(x - r * 0.018, y - r * 0.01);
      ctx.lineTo(x + r * 0.018, y + r * 0.01);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawPineappleStuds(r) {
    ctx.save();
    ctx.fillStyle = "rgba(255,246,170,0.42)";
    ctx.strokeStyle = "rgba(118,82,32,0.16)";
    ctx.lineWidth = Math.max(0.8, r * 0.01);
    for (let y = -0.45; y <= 0.46; y += 0.22) {
      for (let x = -0.44; x <= 0.48; x += 0.22) {
        if (x * x + y * y > 0.56) continue;
        ctx.beginPath();
        ctx.moveTo(x * r, (y - 0.055) * r);
        ctx.lineTo((x + 0.055) * r, y * r);
        ctx.lineTo(x * r, (y + 0.055) * r);
        ctx.lineTo((x - 0.055) * r, y * r);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  function drawNetKnots(r) {
    ctx.save();
    ctx.fillStyle = "rgba(255,250,214,0.22)";
    for (let i = 0; i < 22; i++) {
      const a = i * 2.399;
      const d = r * (0.2 + (i % 6) * 0.105);
      const x = Math.cos(a) * d;
      const y = Math.sin(a) * d * 0.94;
      if (x * x + y * y > r * r * 0.78) continue;
      ctx.beginPath();
      ctx.arc(x, y, r * 0.012, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawWatermelonSkinDepth(r) {
    ctx.save();
    ctx.strokeStyle = "rgba(17,84,56,0.24)";
    ctx.lineWidth = Math.max(2, r * 0.028);
    for (let i = -3; i <= 3; i++) {
      ctx.beginPath();
      ctx.moveTo(i * r * 0.22 - r * 0.08, -r * 0.88);
      ctx.bezierCurveTo(i * r * 0.08, -r * 0.34, i * r * 0.28, r * 0.18, i * r * 0.08, r * 0.84);
      ctx.stroke();
    }
    ctx.fillStyle = "rgba(10,49,38,0.2)";
    for (let i = 0; i < 7; i++) {
      const a = i * 2.45;
      const x = Math.cos(a) * r * 0.42;
      const y = Math.sin(a) * r * 0.34 + r * 0.08;
      ctx.beginPath();
      ctx.ellipse(x, y, r * 0.018, r * 0.032, a, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawTopDimple(def, r) {
    if (r < 22) return;
    ctx.save();
    ctx.fillStyle = "rgba(55,40,34,0.12)";
    ctx.beginPath();
    ctx.ellipse(0, -r * 0.58, r * 0.22, r * 0.065, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawInnerStem(r, color, height) {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(1.6, r * 0.035);
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(-r * 0.03, -r * 0.55);
    ctx.quadraticCurveTo(r * 0.05, -r * (0.64 + height * 0.12), r * 0.12, -r * (0.64 + height * 0.18));
    ctx.stroke();
    ctx.restore();
  }

  function drawCrownInside(r, color, count) {
    ctx.save();
    ctx.fillStyle = color;
    const n = count || 4;
    for (let i = 0; i < n; i++) {
      const t = n === 1 ? 0 : (i / (n - 1) - 0.5);
      ctx.save();
      ctx.translate(t * r * 0.3, -r * 0.57);
      ctx.rotate(t * 0.9);
      ctx.beginPath();
      ctx.ellipse(0, 0, r * 0.09, r * 0.17, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  }

  function drawSeedGrid(r, color, spread, sizeScale) {
    ctx.save();
    ctx.fillStyle = color;
    const size = Math.max(1, r * 0.012 * (sizeScale || 3));
    for (let row = -2; row <= 2; row++) {
      for (let col = -2; col <= 2; col++) {
        const x = (col + (row % 2) * 0.45) * r * 0.19;
        const y = row * r * 0.17 + r * 0.04;
        if (x * x + y * y < r * r * (spread || 0.68)) {
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(0.35);
          ctx.beginPath();
          ctx.ellipse(0, 0, size * 0.55, size, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }
    }
    ctx.restore();
  }

  function drawCitrusSegments(r, color, count) {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(1, r * 0.018);
    for (let i = 0; i < count; i++) {
      const a = i * Math.PI * 2 / count;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(a) * r * 0.74, Math.sin(a) * r * 0.74);
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.74, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  function drawFruitDetail(def, r, now, fruit) {
    ctx.save();
    ctx.globalAlpha = 0.58;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    if (def.detail === "seeds") {
      ctx.fillStyle = def.accent;
      for (let i = 0; i < 10; i++) {
        const a = i * 2.17;
        const d = r * (0.24 + (i % 4) * 0.13);
        const x = Math.cos(a) * d;
        const y = Math.sin(a) * d * 0.82;
        if (x * x + y * y < r * r * 0.72) {
          ctx.beginPath();
          ctx.ellipse(x, y, r * 0.035, r * 0.064, 0.35, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    } else if (def.detail === "bubbles") {
      ctx.fillStyle = def.accent;
      for (let i = 0; i < 5; i++) {
        const a = -0.8 + i * 0.62;
        ctx.beginPath();
        ctx.arc(Math.cos(a) * r * 0.38, Math.sin(a) * r * 0.34 - r * 0.05, r * 0.105, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (def.detail === "pores" || def.detail === "speckles") {
      ctx.fillStyle = def.detail === "pores" ? "rgba(255,236,173,0.72)" : "rgba(128,112,58,0.34)";
      for (let i = 0; i < 16; i++) {
        const a = i * 2.399;
        const d = r * (0.2 + (i % 5) * 0.12);
        ctx.beginPath();
        ctx.arc(Math.cos(a) * d, Math.sin(a) * d * 0.9, Math.max(1, r * 0.018), 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (def.detail === "ring") {
      ctx.strokeStyle = def.accent;
      ctx.lineWidth = Math.max(2, r * 0.07);
      ctx.beginPath();
      ctx.arc(0, 0, r * 0.56, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = "rgba(64,52,37,0.26)";
      for (let i = 0; i < 14; i++) {
        const a = i * Math.PI * 2 / 14;
        ctx.beginPath();
        ctx.arc(Math.cos(a) * r * 0.36, Math.sin(a) * r * 0.36, r * 0.018, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (def.detail === "cleft") {
      ctx.strokeStyle = "rgba(171,76,94,0.38)";
      ctx.lineWidth = Math.max(2, r * 0.05);
      ctx.beginPath();
      ctx.moveTo(r * 0.14, -r * 0.74);
      ctx.bezierCurveTo(r * 0.34, -r * 0.22, r * 0.2, r * 0.48, -r * 0.08, r * 0.78);
      ctx.stroke();
    } else if (def.detail === "grid") {
      ctx.strokeStyle = "rgba(118,82,32,0.28)";
      ctx.lineWidth = Math.max(1.5, r * 0.026);
      for (let x = -r; x <= r; x += r * 0.26) {
        ctx.beginPath();
        ctx.moveTo(x, -r);
        ctx.lineTo(x + r * 1.42, r);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x + r * 1.42, -r);
        ctx.lineTo(x, r);
        ctx.stroke();
      }
    } else if (def.detail === "net") {
      ctx.strokeStyle = def.accent;
      ctx.lineWidth = Math.max(1.5, r * 0.025);
      for (let i = -3; i <= 3; i++) {
        ctx.beginPath();
        ctx.ellipse(0, i * r * 0.14, r * 0.92, r * 0.22, i * 0.06, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(i * r * 0.14, 0, r * 0.24, r * 0.92, i * 0.07, 0, Math.PI * 2);
        ctx.stroke();
      }
    } else if (def.detail === "stripes") {
      ctx.strokeStyle = "rgba(23,88,58,0.55)";
      ctx.lineWidth = Math.max(4, r * 0.075);
      for (let i = -3; i <= 3; i++) {
        ctx.beginPath();
        ctx.moveTo(i * r * 0.25, -r * 0.92);
        ctx.bezierCurveTo(i * r * 0.1, -r * 0.25, i * r * 0.34, r * 0.22, i * r * 0.16, r * 0.92);
        ctx.stroke();
      }
    } else if (def.detail === "leaf" || def.detail === "stem") {
      ctx.strokeStyle = "rgba(94,70,43,0.48)";
      ctx.lineWidth = Math.max(2, r * 0.045);
      ctx.beginPath();
      ctx.moveTo(-r * 0.04, -r * 0.54);
      ctx.lineTo(r * 0.08, -r * 0.82);
      ctx.stroke();
      ctx.fillStyle = def.accent;
      ctx.beginPath();
      ctx.ellipse(r * 0.18, -r * 0.62, r * 0.16, r * 0.075, -0.35, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

  function drawPersonaFace(def, fruit, r, now) {

  function drawFace(fruit, r, now) {
    const blink = now > fruit.blinkAt && now < fruit.blinkAt + 118;
    const def = fruits[fruit.level];
    const mood = fruit.mood === "danger" ? "danger" : (fruit.happyUntil && now < fruit.happyUntil ? "happy" : fruit.mood);
    const vx = clamp((fruit.body.velocity.x || 0) / 9, -1, 1);
    const vy = clamp((fruit.body.velocity.y || 0) / 12, -0.7, 0.9);
    const eyeY = r * 0.02 + vy * r * 0.035;

    const eyeR = Math.max(2.4, r * 0.075);
    const look = vx * r * 0.035;

    ctx.save();
    ctx.fillStyle = "rgba(61, 46, 45, 0.86)";

    ctx.lineWidth = Math.max(1.8, r * 0.038);

    for (const side of [-1, 1]) {
      const x = side * eyeDX + look;
      if (blink) {
        ctx.beginPath();
        ctx.moveTo(x - eyeR * 1.05, eyeY);
        ctx.quadraticCurveTo(x, eyeY + eyeR * 0.56, x + eyeR * 1.05, eyeY);

        ctx.quadraticCurveTo(x, eyeY - eyeR * 0.82, x + eyeR * 1.1, eyeY + eyeR * 0.25);
        ctx.stroke();
      } else if (mood === "danger") {
        ctx.beginPath();
        ctx.ellipse(x, eyeY, eyeR * 0.78, eyeR * 1.28, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.86)";
        ctx.beginPath();
        ctx.arc(x + eyeR * 0.18, eyeY - eyeR * 0.38, eyeR * 0.26, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(61, 46, 45, 0.86)";
      } else {
        ctx.beginPath();
        ctx.ellipse(x, eyeY, eyeR * 0.88, eyeR * 1.18, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.82)";
        ctx.beginPath();
        ctx.arc(x + eyeR * 0.22, eyeY - eyeR * 0.36, eyeR * 0.28, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(61, 46, 45, 0.86)";
      }
    }

    ctx.strokeStyle = "rgba(61, 46, 45, 0.78)";
    ctx.lineWidth = Math.max(1.8, r * 0.035);
    ctx.beginPath();
    if (mood === "danger") {
      ctx.ellipse(0, r * 0.23, r * 0.075, r * 0.11, 0, 0, Math.PI * 2);
      ctx.stroke();
    } else if (mood === "happy") {
      ctx.moveTo(-r * 0.14, r * 0.2);
      ctx.quadraticCurveTo(0, r * 0.38, r * 0.16, r * 0.2);
      ctx.stroke();

      ctx.quadraticCurveTo(0, r * 0.32, r * 0.1, r * 0.22);
      ctx.stroke();

      ctx.moveTo(-r * 0.11, r * 0.2);
      ctx.quadraticCurveTo(0, r * 0.3, r * 0.11, r * 0.2);
      ctx.stroke();
    }

    ctx.globalAlpha = 0.36;
    ctx.fillStyle = "#ff9ca1";
    ctx.beginPath();
    ctx.arc(-r * 0.44, r * 0.17, r * 0.095, 0, Math.PI * 2);
    ctx.arc(r * 0.44, r * 0.17, r * 0.095, 0, Math.PI * 2);

    for (const p of particles) {
      const t = p.age / p.life;
      ctx.globalAlpha = (1 - t) * p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.spin);
      ctx.fillStyle = p.color;
      if (p.kind === "spark") {
        ctx.beginPath();
        ctx.moveTo(0, -p.size);
        ctx.lineTo(p.size * 0.28, -p.size * 0.28);
        ctx.lineTo(p.size, 0);
        ctx.lineTo(p.size * 0.28, p.size * 0.28);
        ctx.lineTo(0, p.size);
        ctx.lineTo(-p.size * 0.28, p.size * 0.28);
        ctx.lineTo(-p.size, 0);
        ctx.lineTo(-p.size * 0.28, -p.size * 0.28);
        ctx.closePath();
        ctx.fill();
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.setTransform(canvas.width / W, 0, 0, canvas.height / H, 0, 0);
    }
    ctx.restore();
  }

  function spawnFloatingText(x, y, text, kind) {
    floaters.push({
      x: clamp(x, LEFT_X + 38, RIGHT_X - 38),
      y: y,
      vy: kind === "combo" ? -0.9 : -0.62,
      text: text,
      kind: kind,
      age: 0,
      life: kind === "combo" ? 1040 : 820
    });

  function drawFloaters() {
    ctx.save();
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    for (const floater of floaters) {
      const t = floater.age / floater.life;
      const alpha = Math.sin(Math.min(1, t) * Math.PI);
      const lift = t * 8;
      ctx.globalAlpha = alpha;
      ctx.font = (floater.kind === "combo" ? "900 18px" : "900 15px") + " Microsoft YaHei, Segoe UI, system-ui, sans-serif";
      ctx.lineWidth = 4;
      ctx.strokeStyle = "rgba(255, 253, 244, 0.92)";
      ctx.fillStyle = floater.kind === "combo" ? "#eb7b63" : "#5e8f65";
      ctx.strokeText(floater.text, floater.x, floater.y - lift);
      ctx.fillText(floater.text, floater.x, floater.y - lift);
    }
    ctx.restore();
  }
