  function pulseImpact(fruit, depth, otherBody) {
    if (!fruit || fruit.removed) {
      return;
    }
    const otherFruit = otherBody && otherBody.fruit;
    const rel = otherFruit ? relativeSpeed(fruit.body, otherBody) : Math.hypot(fruit.body.velocity.x, fruit.body.velocity.y);
    fruit.squash = Math.max(fruit.squash, clamp(depth * 0.045 + rel * 0.02, 0.02, 0.25));
  }

  function relativeSpeed(a, b) {
    return Math.hypot((a.velocity.x || 0) - (b.velocity.x || 0), (a.velocity.y || 0) - (b.velocity.y || 0));
  }

  function randomStartLevel() {
    const bag = [0, 0, 0, 1, 1, 1, 2, 2, 3, 4];
    return bag[Math.floor(Math.random() * bag.length)];
  }

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function wrapAngle(value) {
    while (value > Math.PI) value -= Math.PI * 2;
    while (value < -Math.PI) value += Math.PI * 2;
    return value;
  }

  function roundRect(context, x, y, width, height, radius) {
    const r = Math.min(radius, width / 2, height / 2);
    context.beginPath();
    context.moveTo(x + r, y);
    context.lineTo(x + width - r, y);
    context.quadraticCurveTo(x + width, y, x + width, y + r);
    context.lineTo(x + width, y + height - r);
    context.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
    context.lineTo(x + r, y + height);
    context.quadraticCurveTo(x, y + height, x, y + height - r);
    context.lineTo(x, y + r);
    context.quadraticCurveTo(x, y, x + r, y);
    context.closePath();
  }

  function lighten(hex, amount) {
    const n = parseInt(hex.slice(1), 16);
    const r = Math.min(255, ((n >> 16) & 255) + Math.round(255 * amount));
    const g = Math.min(255, ((n >> 8) & 255) + Math.round(255 * amount));
    const b = Math.min(255, (n & 255) + Math.round(255 * amount));
    return "#" + [r, g, b].map(function (v) {
      return v.toString(16).padStart(2, "0");
    }).join("");
  }

  function createAudioManager() {
    let audioCtx = null;
    let master = null;
    let musicGain = null;

    let sfxFilter = null;
    let compressor = null;

    ];
    const chords = [

      [33, 40, 45, 48, 52],
      [31, 38, 43, 47, 50],
      [36, 43, 48, 52, 57],
      [33, 40, 45, 48, 55],
      [35, 42, 47, 50, 54],
      [36, 43, 48, 52, 55]
    ];

    const api = {
      muted: localStorage.getItem(SOUND_KEY) === "1",
      unlock: unlock,
      setMuted: setMuted,
      playDrop: function (level) {
        if (!ready()) return;
        const t = audioCtx.currentTime;
        const body = 156 + level * 9;
        playPitchBend(body * 1.22, body, 0.18, "sine", 0.023, t);
        playRoundedTap(220 + level * 12, 0.12, 0.026, t + 0.012);

      playCollision: function (level, impact) {

        const vol = clamp(impact / 18, 0.012, 0.045);

      playMerge: function (level) {
        if (!ready()) return;
        const t = audioCtx.currentTime;
        const scale = [0, 3, 7, 10, 12, 15, 19];
        const root = 330 * Math.pow(2, Math.floor(level / 4) / 12);
        const base = root * Math.pow(2, scale[level % scale.length] / 12);
        playPluck(base, 0.24, 0.035, t, 1200);
        playPluck(base * 1.2, 0.28, 0.029, t + 0.07, 1450);
        playPluck(base * 1.5, 0.34, 0.021, t + 0.16, 1650);
        playBloom(base * 1.5, 0.46, 0.013, t + 0.04);
        playSoftNoise(0.16, 0.004, t + 0.04, 1800);
      },
      playGameOver: function () {
        if (!ready()) return;
        const t = audioCtx.currentTime;
        playPluck(330, 0.28, 0.026, t, 1050);
        playPluck(294, 0.34, 0.023, t + 0.2, 940);
        playPluck(247, 0.48, 0.022, t + 0.48, 820);
      },
      playButton: function () {
        if (!ready()) return;
        const t = audioCtx.currentTime;
        playPluck(470, 0.1, 0.014, t, 1300);
        playBloom(620, 0.14, 0.0048, t + 0.045);
      },
      playClear: function () {
        if (!ready()) return;
        const t = audioCtx.currentTime;
        const notes = [262, 330, 392, 523, 659];
        for (let i = 0; i < notes.length; i++) {
          playPluck(notes[i], 0.34 + i * 0.045, 0.038 - i * 0.003, t + i * 0.12, 1750 + i * 180);
        }
        playBloom(523, 0.92, 0.026, t + 0.36);
        playSoftNoise(0.42, 0.009, t + 0.42, 2400);
      },
      startMusic: startMusic,
      duckMusic: duckMusic
    };

    return api;

    function unlock() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        master = audioCtx.createGain();
        musicGain = audioCtx.createGain();
        sfxGain = audioCtx.createGain();
        musicFilter = audioCtx.createBiquadFilter();
        sfxFilter = audioCtx.createBiquadFilter();
        compressor = audioCtx.createDynamicsCompressor();
        delay = audioCtx.createDelay(0.6);
        delaySend = audioCtx.createGain();
        delayReturn = audioCtx.createGain();
        reverb = audioCtx.createConvolver();
        reverbSend = audioCtx.createGain();
        reverbReturn = audioCtx.createGain();

        master.gain.value = api.muted ? 0 : 0.76;
        musicGain.gain.value = 0.0001;
        sfxGain.gain.value = 0.56;
        musicFilter.type = "lowpass";
        musicFilter.frequency.value = 1250;
        musicFilter.Q.value = 0.28;
        sfxFilter.type = "lowpass";
        sfxFilter.frequency.value = 2800;
        sfxFilter.Q.value = 0.28;
        compressor.threshold.value = -22;
        compressor.knee.value = 22;
        compressor.ratio.value = 1.55;
        compressor.attack.value = 0.026;
        compressor.release.value = 0.34;
        delay.delayTime.value = 0.28;
        delaySend.gain.value = 0.035;
        delayReturn.gain.value = 0.14;
        reverb.buffer = makeImpulse(1.65, 3.4);
        reverbSend.gain.value = 0.052;
        reverbReturn.gain.value = 0.12;

        musicGain.connect(musicFilter);
        musicFilter.connect(compressor);
        musicGain.connect(delaySend);
        musicGain.connect(reverbSend);
        delaySend.connect(delay);
        delay.connect(delayReturn);
        delayReturn.connect(compressor);
        reverbSend.connect(reverb);
        reverb.connect(reverbReturn);
        reverbReturn.connect(compressor);
        sfxGain.connect(sfxFilter);
        sfxGain.connect(reverbSend);
        sfxFilter.connect(compressor);
        compressor.connect(master);
        master.connect(audioCtx.destination);
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
      startMusic();
    }

    function ready() {
      return audioCtx && !api.muted;
    }

    function setMuted(value) {
      api.muted = value;
      localStorage.setItem(SOUND_KEY, value ? "1" : "0");
      if (audioCtx && master) {
        master.gain.cancelScheduledValues(audioCtx.currentTime);
        master.gain.setTargetAtTime(value ? 0 : 0.76, audioCtx.currentTime, 0.04);
      }
      if (!value && audioCtx) {
        startMusic();
      }
    }

    function playTone(freq, duration, type, volume, when, attack, release) {
      if (!audioCtx || api.muted) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, when);
      gain.gain.setValueAtTime(0.0001, when);
      gain.gain.exponentialRampToValueAtTime(Math.max(0.0002, volume), when + attack);
      gain.gain.exponentialRampToValueAtTime(0.0001, when + duration + release);
      osc.connect(gain);
      gain.connect(sfxGain);
      osc.start(when);
      osc.stop(when + duration + release + 0.03);
    }

    function playPitchBend(from, to, duration, type, volume, when) {
      if (!audioCtx || api.muted) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type || "sine";
      osc.frequency.setValueAtTime(from, when);
      osc.frequency.exponentialRampToValueAtTime(Math.max(1, to), when + duration);
      gain.gain.setValueAtTime(0.0001, when);
      gain.gain.exponentialRampToValueAtTime(Math.max(0.0002, volume), when + 0.006);
      gain.gain.exponentialRampToValueAtTime(0.0001, when + duration + 0.04);
      osc.connect(gain);
      gain.connect(sfxGain);
      osc.start(when);
      osc.stop(when + duration + 0.08);
    }

    function playRoundedTap(freq, duration, volume, when) {
      if (!audioCtx || api.muted) return;
      const osc = audioCtx.createOscillator();
      const sub = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const subGain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      osc.type = "triangle";
      sub.type = "sine";
      osc.frequency.setValueAtTime(freq, when);
      osc.frequency.exponentialRampToValueAtTime(Math.max(60, freq * 0.72), when + duration);
      sub.frequency.setValueAtTime(Math.max(50, freq * 0.5), when);
      filter.type = "lowpass";
      filter.frequency.setValueAtTime(900 + freq * 1.1, when);
      filter.frequency.exponentialRampToValueAtTime(360, when + duration);
      gain.gain.setValueAtTime(0.0001, when);
      gain.gain.exponentialRampToValueAtTime(Math.max(0.0002, volume), when + 0.008);
      gain.gain.exponentialRampToValueAtTime(0.0001, when + duration);
      subGain.gain.setValueAtTime(volume * 0.24, when);
      subGain.gain.exponentialRampToValueAtTime(0.0001, when + duration * 0.82);
      osc.connect(filter);
      filter.connect(gain);
      sub.connect(subGain);
      subGain.connect(gain);
      gain.connect(sfxGain);
      osc.start(when);
      sub.start(when);
      osc.stop(when + duration + 0.04);
      sub.stop(when + duration + 0.04);
    }

    function playPluck(freq, duration, volume, when, cutoff) {
      if (!audioCtx || api.muted) return;
      const osc = audioCtx.createOscillator();
      const overtone = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const overtoneGain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      osc.type = "triangle";
      overtone.type = "sine";
      osc.frequency.setValueAtTime(freq, when);
      overtone.frequency.setValueAtTime(freq * 2.01, when);
      filter.type = "lowpass";
      filter.frequency.setValueAtTime(cutoff || 2200, when);
      filter.frequency.exponentialRampToValueAtTime(Math.max(420, (cutoff || 2200) * 0.45), when + duration);
      gain.gain.setValueAtTime(0.0001, when);
      gain.gain.exponentialRampToValueAtTime(Math.max(0.0002, volume), when + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, when + duration);
      overtoneGain.gain.setValueAtTime(volume * 0.18, when);
      overtoneGain.gain.exponentialRampToValueAtTime(0.0001, when + duration * 0.55);
      osc.connect(filter);
      filter.connect(gain);
      overtone.connect(overtoneGain);
      overtoneGain.connect(gain);
      gain.connect(sfxGain);
      osc.start(when);
      overtone.start(when);
      osc.stop(when + duration + 0.05);
      overtone.stop(when + duration + 0.05);
    }

    function playBloom(freq, duration, volume, when) {
      if (!audioCtx || api.muted) return;
      const voices = [1, 1.5, 2.01];
      for (let i = 0; i < voices.length; i++) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        osc.type = i === 0 ? "sine" : "triangle";
        osc.frequency.setValueAtTime(freq * voices[i], when + i * 0.018);
        filter.type = "lowpass";
        filter.frequency.value = 1800 + i * 420;
        gain.gain.setValueAtTime(0.0001, when + i * 0.018);
        gain.gain.exponentialRampToValueAtTime(Math.max(0.0002, volume / (i + 1.35)), when + 0.05 + i * 0.018);
        gain.gain.exponentialRampToValueAtTime(0.0001, when + duration + i * 0.045);
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(sfxGain);
        osc.start(when + i * 0.018);
        osc.stop(when + duration + i * 0.045 + 0.05);
      }
    }

    function playSoftNoise(duration, volume, when, cutoff) {
      if (!audioCtx || api.muted) return;
      const length = Math.max(1, Math.floor(audioCtx.sampleRate * duration));
      const buffer = audioCtx.createBuffer(1, length, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < length; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 1.8);
      }
      const source = audioCtx.createBufferSource();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      source.buffer = buffer;
      filter.type = "bandpass";
      filter.frequency.value = cutoff || 1800;
      filter.Q.value = 0.8;
      gain.gain.setValueAtTime(Math.max(0.0002, volume), when);
      gain.gain.exponentialRampToValueAtTime(0.0001, when + duration);
      source.connect(filter);
      filter.connect(gain);
      gain.connect(sfxGain);
      source.start(when);
    }

    function playMusicTone(freq, duration, volume, when, type, cutoff) {
      if (!audioCtx || api.muted) return;
      const osc = audioCtx.createOscillator();
      const overtone = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const overtoneGain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      osc.type = type || "sine";
      overtone.type = "sine";
      osc.frequency.setValueAtTime(freq, when);
      overtone.frequency.setValueAtTime(freq * 2.005, when);
      filter.type = "lowpass";
      filter.frequency.value = cutoff || 820;
      filter.Q.value = 0.18;
      gain.gain.setValueAtTime(0.0001, when);
      gain.gain.linearRampToValueAtTime(Math.max(0.0002, volume), when + 0.045);
      gain.gain.setTargetAtTime(0.0001, when + duration * 0.58, duration * 0.26);
      overtoneGain.gain.setValueAtTime(volume * 0.08, when);
      overtoneGain.gain.exponentialRampToValueAtTime(0.0001, when + duration * 0.62);
      osc.connect(filter);
      overtone.connect(overtoneGain);
      overtoneGain.connect(filter);
      filter.connect(gain);
      gain.connect(musicGain);
      osc.start(when);
      overtone.start(when);
      osc.stop(when + duration + 0.2);
      overtone.stop(when + duration + 0.2);
    }

    function playPadTone(freq, duration, volume, when) {
      if (!audioCtx || api.muted) return;
      const osc = audioCtx.createOscillator();
      const slow = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const slowGain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      osc.type = "sine";
      slow.type = "triangle";
      osc.frequency.setValueAtTime(freq, when);
      slow.frequency.setValueAtTime(freq * 1.005, when);
      filter.type = "lowpass";
      filter.frequency.value = 520;
      filter.Q.value = 0.22;
      gain.gain.setValueAtTime(0.0001, when);
      gain.gain.linearRampToValueAtTime(Math.max(0.0002, volume), when + 0.9);
      gain.gain.setTargetAtTime(0.0001, when + duration * 0.7, 0.9);
      slowGain.gain.value = volume * 0.18;
      osc.connect(filter);
      slow.connect(slowGain);
      slowGain.connect(filter);
      filter.connect(gain);
      gain.connect(musicGain);
      osc.start(when);
      slow.start(when);
      osc.stop(when + duration + 0.8);
      slow.stop(when + duration + 0.8);
    }

    function makeImpulse(duration, decay) {
      const length = Math.max(1, Math.floor(audioCtx.sampleRate * duration));
      const buffer = audioCtx.createBuffer(2, length, audioCtx.sampleRate);
      for (let channel = 0; channel < 2; channel++) {
        const data = buffer.getChannelData(channel);
        for (let i = 0; i < length; i++) {
          const t = i / length;
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, decay) * 0.32;
        }
      }
      return buffer;
    }

    function startMusic() {
      if (!audioCtx || api.muted) {
        return;
      }
      musicGain.gain.cancelScheduledValues(audioCtx.currentTime);
      musicGain.gain.setTargetAtTime(MUSIC_VOLUME, audioCtx.currentTime, 0.55);
      if (scheduler) {
        return;
      }
      nextNoteTime = audioCtx.currentTime + 0.08;
      scheduler = window.setInterval(scheduleMusic, 90);
      scheduleMusic();
    }

    function duckMusic() {
      if (!audioCtx || !musicGain) return;
      musicGain.gain.cancelScheduledValues(audioCtx.currentTime);
      musicGain.gain.setTargetAtTime(MUSIC_DUCKED_VOLUME, audioCtx.currentTime, 0.12);
      window.setTimeout(function () {
        if (audioCtx && musicGain && !api.muted) {
          musicGain.gain.setTargetAtTime(MUSIC_VOLUME, audioCtx.currentTime, 0.45);
        }
      }, 1400);
    }

    function scheduleMusic() {
      if (!audioCtx || api.muted) {
        if (scheduler) {
          window.clearInterval(scheduler);
          scheduler = null;
        }
        return;
      }
      const beat = 60 / MUSIC_BPM / 2;
      while (nextNoteTime < audioCtx.currentTime + 0.7) {
        const note = melody[step % melody.length];
        const twinkle = twinkles[step % twinkles.length];
        if (step % 16 === 0) {
          const chord = chords[Math.floor(step / 16) % chords.length];
          for (let i = 0; i < chord.length; i++) {
            playPadTone(midi(chord[i]), beat * 16.8, 0.0048 + i * 0.00055, nextNoteTime + i * 0.032);
          }
        }
        if (note !== null) {
          playMusicTone(midi(note), beat * 1.55, 0.014, nextNoteTime, "sine", 920);
          if (step % 8 === 0) {
            playMusicTone(midi(note - 12), beat * 2.2, 0.0052, nextNoteTime + 0.012, "sine", 680);
          }
        }
        if (twinkle !== null) {
          playMusicTone(midi(twinkle), beat * 1.15, 0.0046, nextNoteTime + beat * 0.28, "sine", 1080);
        }
        nextNoteTime += beat;
        step++;
      }
    }

    function midi(note) {
      return 440 * Math.pow(2, (note - 69) / 12);
    }
  }
})();
