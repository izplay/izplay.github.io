<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>合成大西瓜</title>
  <meta name="description" content="合成大西瓜 —— 轻松治愈的水果物理合成小游戏，从樱桃合成到大西瓜。">
  <meta name="theme-color" content="#f5c76a">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='34' r='26' fill='%2346b76c'/%3E%3Cpath d='M32 8c-3 4-3 8 0 12' stroke='%237fa85d' stroke-width='4' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
  <style>
:root {
  color-scheme: light;
  --ink: #31403b;
  --muted: #7b8b80;
  --paper: #fff9ed;
  --panel: rgba(255, 253, 244, 0.88);
  --line: rgba(74, 97, 83, 0.16);
  --accent: #f08a77;
  --mint: #87c9aa;
  --gold: #f5c76a;
  --ui-font: "Segoe UI Variable", "PingFang SC", "Microsoft YaHei UI", "Microsoft YaHei", system-ui, sans-serif;
  --display-font: "Arial Rounded MT Bold", "SF Pro Rounded", "PingFang SC", "Microsoft YaHei UI", sans-serif;
  font-family: var(--ui-font);
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
  overflow: hidden;
  background:
    radial-gradient(circle at 15% 14%, rgba(255, 209, 141, 0.34), transparent 23rem),
    radial-gradient(circle at 88% 18%, rgba(125, 199, 172, 0.28), transparent 26rem),
    linear-gradient(135deg, #fff9ed 0%, #f5fbef 47%, #fff3ec 100%);
  color: var(--ink);
}

body {
  display: grid;
  place-items: center;
}

.app {
  width: 100vw;
  max-width: 980px;
  height: 100dvh;
  min-height: 620px;
  display: grid;
  place-items: center;
  padding: clamp(10px, 2vw, 22px);
}

.game-shell {
  position: relative;
  width: min(calc(100vw - clamp(16px, 4vw, 44px)), 760px);
  height: min(100%, 820px);
  display: grid;
  grid-template-rows: auto 1fr;
  gap: 10px;
}

.topbar {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: var(--panel);
  box-shadow: 0 18px 50px rgba(82, 62, 37, 0.12);
  backdrop-filter: blur(16px);
}

.brand {
  text-align: center;
  min-width: 116px;
}

.brand-title {
  display: block;
  font-size: 18px;
  font-weight: 850;
  font-family: var(--display-font);
  letter-spacing: 0;
  line-height: 1.05;
  user-select: none;
  touch-action: manipulation;
  transition: color 180ms ease, transform 180ms ease, text-shadow 180ms ease;
}

.brand-sub {
  display: block;
  margin-top: 2px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
  transition: color 180ms ease;
}

.game-shell.is-cheat-mode .brand-title,
.game-shell.is-cheat-mode .brand-sub {
  color: #d56f5d;
}

.game-shell.is-cheat-mode .brand-title {
  text-shadow: 0 5px 16px rgba(213, 111, 93, 0.2);
}

.score-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(52px, 1fr));
  gap: 8px;
}

.score-box {
  min-height: 48px;
  padding: 6px 8px;
  border: 1px solid rgba(72, 92, 78, 0.13);
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.58);
}

.score-label {
  display: block;
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
}

.score-value {
  display: block;
  margin-top: 2px;
  font-variant-numeric: tabular-nums;
  font-size: clamp(18px, 4vw, 25px);
  font-weight: 900;
  font-family: var(--display-font);
}

.control-row {
  justify-self: end;
  display: flex;
  align-items: center;
  gap: 8px;
}

.watermelon-trophy {
  position: relative;
  width: 32px;
  height: 32px;
  display: none;
  place-items: center;
  flex: 0 0 32px;
}

.watermelon-trophy.is-visible {
  display: grid;
  animation: trophy-pop 520ms cubic-bezier(0.2, 0.8, 0.2, 1.16) both;
}

.trophy-fruit,
.clear-watermelon {
  border-radius: 50%;
  background:
    linear-gradient(72deg, transparent 0 16%, rgba(18, 104, 57, 0.48) 17% 31%, transparent 32% 48%, rgba(18, 104, 57, 0.5) 49% 64%, transparent 65% 100%),
    radial-gradient(circle at 34% 26%, rgba(255,255,255,0.78), transparent 22%),
    radial-gradient(circle at 35% 35%, #58c87b, #176c48);
  box-shadow:
    inset 0 -5px 9px rgba(26, 76, 50, 0.22),
    inset 0 0 0 2px rgba(255,255,255,0.5),
    0 7px 16px rgba(39, 91, 57, 0.18);
}

.trophy-fruit {
  width: 29px;
  height: 29px;
}

.trophy-count {
  position: absolute;
  right: -4px;
  bottom: -3px;
  min-width: 16px;
  height: 16px;
  display: grid;
  place-items: center;
  padding: 0 3px;
  border: 2px solid #fff9ed;
  border-radius: 999px;
  background: #ed806d;
  color: #fff;
  font-size: 9px;
  font-weight: 950;
  font-family: var(--display-font);
  line-height: 1;
}

.next-pill {
  height: 42px;
  min-width: 118px;
  display: grid;
  grid-template-columns: 26px auto;
  grid-template-rows: 1fr 1fr;
  column-gap: 8px;
  align-items: center;
  padding: 5px 9px 5px 7px;
  border: 1px solid rgba(57, 75, 64, 0.13);
  border-radius: 21px;
  background: rgba(255, 255, 255, 0.58);
  color: var(--ink);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.82);
  cursor: pointer;
  font: inherit;
  text-align: left;
  transition: transform 140ms ease, background 140ms ease, box-shadow 140ms ease;
}

.next-pill:hover {
  background: rgba(255, 255, 255, 0.74);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.9),
    0 8px 18px rgba(59, 41, 24, 0.08);
}

.next-pill:active {
  transform: translateY(1px) scale(0.99);
}

.mini-fruit {
  grid-row: 1 / 3;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 34% 28%, rgba(255,255,255,0.72), transparent 0.34rem),
    radial-gradient(circle at 34% 30%, var(--fruit-a, #f08a77), var(--fruit-b, #d8615a));
  box-shadow:
    inset 0 -5px 8px rgba(67, 44, 34, 0.16),
    inset 0 0 0 2px rgba(255,255,255,0.44),
    0 4px 10px rgba(59, 41, 24, 0.12);
}

.next-caption {
  color: var(--muted);
  font-size: 10px;
  font-weight: 900;
  line-height: 1;
}

.next-name {
  max-width: 58px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 13px;
  font-weight: 900;
  line-height: 1;
}

.icon-button {
  width: 42px;
  height: 42px;
  display: grid;
  place-items: center;
  border: 1px solid rgba(57, 75, 64, 0.15);
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.64);
  color: var(--ink);
  box-shadow: 0 8px 20px rgba(59, 41, 24, 0.08);
  cursor: pointer;
  font: 900 22px/1 "Segoe UI Symbol", "Segoe UI", system-ui, sans-serif;
  transition: transform 140ms ease, background 140ms ease, box-shadow 140ms ease;
}

.icon-button:hover {
  transform: translateY(-1px);
  background: #ffffff;
  box-shadow: 0 12px 24px rgba(59, 41, 24, 0.12);
}

.icon-button:active {
  transform: translateY(1px) scale(0.98);
}

.icon-glyph {
  width: 20px;
  height: 20px;
  pointer-events: none;
}

.icon-glyph--sound-off {
  display: none;
}

#soundBtn.is-muted .icon-glyph--sound-on {
  display: none;
}

#soundBtn.is-muted .icon-glyph--sound-off {
  display: block;
}

.stage-frame {
  position: relative;
  min-height: 0;
  border: 1px solid rgba(74, 97, 83, 0.17);
  border-radius: 20px;
  overflow: hidden;
  background: linear-gradient(180deg, rgba(255, 253, 244, 0.86), rgba(250, 242, 226, 0.9));
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.85),
    0 24px 70px rgba(86, 59, 35, 0.16);
}

.play-zone {
  position: relative;
  min-height: 0;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 178px;
  gap: 10px;
}

.path-scrim {
  display: none;
}

.evolution-card {
  position: relative;
  min-width: 0;
  min-height: 0;
  display: grid;
  grid-template-rows: auto 1fr auto;
  align-items: stretch;
  padding: 13px 10px 10px;
  border: 1px solid rgba(74, 97, 83, 0.15);
  border-radius: 20px;
  background:
    radial-gradient(circle at 30% 22%, rgba(255, 244, 205, 0.92), rgba(255, 255, 255, 0) 34%),
    linear-gradient(180deg, rgba(255, 253, 244, 0.82), rgba(247, 239, 218, 0.76));
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.86),
    0 20px 56px rgba(86, 59, 35, 0.12);
  backdrop-filter: blur(12px);
}

.evolution-title {
  color: rgba(62, 78, 68, 0.82);
  text-align: center;
  font-size: 13px;
  font-weight: 950;
  line-height: 1;
}

#gameCanvas {
  display: block;
  width: 100%;
  height: 100%;
  min-height: 0;
  touch-action: none;
  cursor: none;
}

.game-shell.is-cheat-mode #gameCanvas {
  cursor: grab;
}

.game-shell.is-cheat-dragging #gameCanvas {
  cursor: grabbing;
}

.game-shell.is-cheat-mode .stage-frame {
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.85),
    0 0 0 2px rgba(240, 138, 119, 0.22),
    0 24px 70px rgba(86, 59, 35, 0.16);
}

.cheat-toast {
  position: absolute;
  left: 50%;
  top: 14px;
  z-index: 5;
  max-width: calc(100% - 28px);
  padding: 8px 12px;
  border: 1px solid rgba(213, 111, 93, 0.2);
  border-radius: 999px;
  background: rgba(255, 253, 244, 0.9);
  color: #8d5147;
  box-shadow: 0 10px 28px rgba(76, 52, 35, 0.14);
  opacity: 0;
  pointer-events: none;
  transform: translate(-50%, -8px);
  transition: opacity 180ms ease, transform 180ms ease;
  white-space: normal;
  text-align: center;
  font-size: 12px;
  font-weight: 900;
}

.cheat-toast.is-visible {
  opacity: 1;
  transform: translate(-50%, 0);
}

.clear-banner {
  position: absolute;
  inset: 0;
  z-index: 4;
  display: grid;
  place-items: center;
  padding: 24px;
  overflow: hidden;
  background: rgba(255, 249, 237, 0.76);
  opacity: 0;
  pointer-events: none;
  transition: opacity 260ms ease;
  backdrop-filter: blur(5px);
}

.clear-banner.is-visible {
  opacity: 1;
}

.clear-celebration {
  position: relative;
  isolation: isolate;
  min-width: min(300px, 88vw);
  display: grid;
  justify-items: center;
  gap: 11px;
  padding: 32px 18px 28px;
  text-align: center;
}

.clear-halo {
  position: absolute;
  z-index: -1;
  top: 7px;
  left: 50%;
  width: 180px;
  height: 180px;
  border: 2px solid rgba(245, 199, 106, 0.56);
  border-radius: 50%;
  opacity: 0;
  transform: translateX(-50%) scale(0.4);
}

.clear-halo::before,
.clear-halo::after {
  content: "";
  position: absolute;
  inset: 14px;
  border: 2px solid rgba(135, 201, 170, 0.42);
  border-radius: 50%;
}

.clear-halo::after {
  inset: 31px;
  border-color: rgba(240, 138, 119, 0.3);
}

.clear-banner.is-visible .clear-halo {
  animation: clear-halo-bloom 1300ms 120ms cubic-bezier(0.16, 0.8, 0.22, 1) both;
}

.clear-sparkles {
  position: absolute;
  top: 3px;
  left: 50%;
  width: 210px;
  height: 190px;
  pointer-events: none;
  transform: translateX(-50%);
}

.clear-sparkles i {
  position: absolute;
  width: 9px;
  height: 9px;
  border-radius: 3px;
  background: #f5c76a;
  opacity: 0;
  transform: rotate(45deg) scale(0.2);
}

.clear-sparkles i:nth-child(1) { left: 7%; top: 44%; background: #f08a77; }
.clear-sparkles i:nth-child(2) { left: 18%; top: 15%; width: 7px; height: 7px; background: #87c9aa; }
.clear-sparkles i:nth-child(3) { left: 39%; top: 2%; width: 6px; height: 6px; }
.clear-sparkles i:nth-child(4) { right: 38%; top: 5%; background: #f08a77; }
.clear-sparkles i:nth-child(5) { right: 16%; top: 18%; width: 7px; height: 7px; background: #87c9aa; }
.clear-sparkles i:nth-child(6) { right: 6%; top: 47%; }
.clear-sparkles i:nth-child(7) { left: 17%; top: 72%; width: 6px; height: 6px; }
.clear-sparkles i:nth-child(8) { right: 17%; top: 74%; width: 6px; height: 6px; background: #f08a77; }

.clear-banner.is-visible .clear-sparkles i {
  animation: clear-sparkle-pop 1000ms cubic-bezier(0.16, 0.82, 0.24, 1) both;
}

.clear-banner.is-visible .clear-sparkles i:nth-child(2),
.clear-banner.is-visible .clear-sparkles i:nth-child(6) { animation-delay: 100ms; }
.clear-banner.is-visible .clear-sparkles i:nth-child(3),
.clear-banner.is-visible .clear-sparkles i:nth-child(7) { animation-delay: 190ms; }
.clear-banner.is-visible .clear-sparkles i:nth-child(4),
.clear-banner.is-visible .clear-sparkles i:nth-child(8) { animation-delay: 270ms; }

.clear-watermelon {
  width: 126px;
  height: 126px;
  position: relative;
  z-index: 1;
}

.clear-watermelon::before,
.clear-watermelon::after {
  content: "";
  position: absolute;
  top: 46%;
  width: 8px;
  height: 10px;
  border-radius: 50%;
  background: rgba(46, 55, 45, 0.78);
}

.clear-watermelon::before {
  left: 31%;
  box-shadow: 34px 0 0 rgba(46, 55, 45, 0.78);
}

.clear-watermelon::after {
  left: 44%;
  top: 64%;
  width: 16px;
  height: 9px;
  border-radius: 0 0 16px 16px;
  background: transparent;
  border-bottom: 4px solid rgba(46, 55, 45, 0.72);
}

.clear-watermelon-cheeks {
  position: absolute;
  left: 19%;
  top: 58%;
  width: 17px;
  height: 10px;
  border-radius: 50%;
  background: rgba(255, 142, 147, 0.52);
  box-shadow: 61px 0 0 rgba(255, 142, 147, 0.52);
}

.clear-watermelon-leaf {
  position: absolute;
  left: 54%;
  top: -8px;
  width: 27px;
  height: 16px;
  border-radius: 80% 12% 80% 12%;
  background: #7fa85d;
  box-shadow: inset 0 2px 0 rgba(255,255,255,0.38);
  transform: rotate(-18deg);
}

.clear-banner.is-visible .clear-watermelon {
  animation:
    clear-watermelon-arrive 900ms cubic-bezier(0.18, 0.82, 0.24, 1.12) both,
    clear-watermelon-idle 1500ms 920ms ease-in-out infinite;
}

.clear-title {
  color: #375a47;
  font-size: clamp(24px, 6vw, 36px);
  font-weight: 950;
  font-family: var(--display-font);
  line-height: 1;
  opacity: 0;
}

.clear-copy {
  color: rgba(65, 86, 73, 0.72);
  font-size: 13px;
  font-weight: 800;
  opacity: 0;
}

.clear-banner.is-visible .clear-title {
  animation: clear-text-arrive 560ms 430ms cubic-bezier(0.18, 0.78, 0.24, 1) both;
}

.clear-banner.is-visible .clear-copy {
  animation: clear-text-arrive 560ms 560ms cubic-bezier(0.18, 0.78, 0.24, 1) both;
}

.catalog-drag-ghost {
  position: fixed;
  left: 0;
  top: 0;
  z-index: 100;
  display: grid;
  grid-template-columns: 38px auto;
  align-items: center;
  gap: 8px;
  padding: 6px 10px 6px 6px;
  border: 1px solid rgba(74, 97, 83, 0.14);
  border-radius: 999px;
  background: rgba(255, 253, 244, 0.94);
  color: #3d554b;
  box-shadow: 0 14px 34px rgba(66, 46, 30, 0.18);
  opacity: 0;
  pointer-events: none;
  transform: translate(-50%, -50%) scale(0.84);
  transition: opacity 100ms ease, transform 100ms ease;
  font-size: 12px;
  font-weight: 900;
}

.catalog-drag-ghost.is-visible {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

.catalog-ghost-fruit {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 32% 25%, rgba(255,255,255,0.86), transparent 22%),
    radial-gradient(circle at 34% 30%, var(--fruit-a), var(--fruit-b));
  box-shadow:
    inset 0 -5px 8px rgba(58,39,29,0.15),
    inset 0 0 0 2px rgba(255,255,255,0.5);
}

.game-shell.is-catalog-mode .fruit-progress {
  pointer-events: auto;
}

.game-shell.is-catalog-mode .progress-pip {
  cursor: grab;
  touch-action: none;
  user-select: none;
}

.game-shell.is-catalog-mode .progress-pip:hover {
  background: rgba(255, 255, 255, 0.62);
}

.game-shell.is-catalog-dragging .progress-pip {
  cursor: grabbing;
}

@keyframes clear-watermelon-arrive {
  0% { opacity: 0; transform: translateY(58px) scale(0.36, 0.52) rotate(-12deg); }
  50% { opacity: 1; transform: translateY(-12px) scale(1.1, 0.94) rotate(5deg); }
  72% { transform: translateY(3px) scale(0.96, 1.05) rotate(-2deg); }
  100% { opacity: 1; transform: translateY(0) scale(1) rotate(0); }
}

@keyframes clear-watermelon-idle {
  0%, 100% { transform: translateY(0) rotate(-1deg); }
  50% { transform: translateY(-5px) rotate(1.5deg); }
}

@keyframes clear-halo-bloom {
  0% { opacity: 0; transform: translateX(-50%) scale(0.35) rotate(-8deg); }
  58% { opacity: 0.9; }
  100% { opacity: 0.4; transform: translateX(-50%) scale(1.18) rotate(8deg); }
}

@keyframes clear-sparkle-pop {
  0% { opacity: 0; transform: translateY(18px) rotate(20deg) scale(0.2); }
  45% { opacity: 1; transform: translateY(-5px) rotate(45deg) scale(1.15); }
  100% { opacity: 0.3; transform: translateY(0) rotate(70deg) scale(0.76); }
}

@keyframes clear-text-arrive {
  0% { opacity: 0; transform: translateY(12px); }
  100% { opacity: 1; transform: translateY(0); }
}

@keyframes trophy-pop {
  0% { opacity: 0; transform: scale(0.25) rotate(-16deg); }
  70% { opacity: 1; transform: scale(1.15) rotate(4deg); }
  100% { opacity: 1; transform: scale(1) rotate(0); }
}

.fruit-progress {
  position: relative;
  min-height: 0;
  display: grid;
  grid-template-rows: repeat(11, minmax(0, 1fr));
  gap: 3px;
  padding: 10px 0 8px;
  pointer-events: none;
}

.fruit-progress::before {
  content: "";
  position: absolute;
  left: 19px;
  top: 28px;
  bottom: 28px;
  width: 2px;
  border-radius: 999px;
  background:
    linear-gradient(180deg, rgba(135, 201, 170, 0), rgba(135, 201, 170, 0.46) 14%, rgba(245, 199, 106, 0.5) 52%, rgba(240, 138, 119, 0.28) 86%, rgba(240, 138, 119, 0));
  z-index: 0;
}

.progress-pip {
  position: relative;
  min-width: 0;
  min-height: 38px;
  display: grid;
  grid-template-columns: 40px minmax(0, 1fr);
  align-items: center;
  gap: 8px;
  padding: 3px 4px 3px 0;
  border-radius: 12px;
  opacity: 0.44;
  filter: saturate(0.74);
  transition: opacity 180ms ease, transform 180ms ease, filter 180ms ease, background 180ms ease;
  z-index: 1;
}

.progress-fruit {
  position: relative;
  justify-self: center;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background:
    var(--fruit-detail, radial-gradient(circle, rgba(255,255,255,0) 0 100%)),
    radial-gradient(circle at 32% 24%, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0) 22%),
    radial-gradient(circle at 34% 30%, var(--fruit-a), var(--fruit-b));
  box-shadow:
    inset 0 -5px 8px rgba(58, 39, 29, 0.15),
    inset 0 0 0 2px rgba(255, 255, 255, 0.46),
    0 6px 14px rgba(69, 48, 31, 0.12);
}

.progress-fruit::before,
.progress-fruit::after,
.fruit-mark {
  content: "";
  position: absolute;
}

.progress-fruit::before,
.progress-fruit::after {
  border-radius: 50%;
}

.progress-fruit::before {
  left: 29%;
  top: 45%;
  width: 3px;
  height: 3px;
  background: rgba(62, 42, 38, 0.68);
  box-shadow: 11px 0 0 rgba(62, 42, 38, 0.62);
}

.progress-fruit::after {
  left: 45%;
  top: 58%;
  width: 7px;
  height: 4px;
  border-bottom: 2px solid rgba(62, 42, 38, 0.5);
  border-radius: 0 0 12px 12px;
}

.fruit-mark {
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
}

.progress-pip--cherry .fruit-mark {
  inset: -9px 4px auto auto;
  width: 15px;
  height: 16px;
  border-radius: 0;
  border-left: 2px solid rgba(70, 121, 78, 0.78);
  transform: rotate(32deg);
}

.progress-pip--strawberry .progress-fruit {
  border-radius: 54% 54% 64% 64%;
  --fruit-detail:
    radial-gradient(circle at 35% 34%, rgba(255, 241, 176, 0.92) 0 1.5px, transparent 2px),
    radial-gradient(circle at 58% 48%, rgba(255, 241, 176, 0.88) 0 1.4px, transparent 2px),
    radial-gradient(circle at 42% 68%, rgba(255, 241, 176, 0.82) 0 1.3px, transparent 2px);
}

.progress-pip--strawberry .fruit-mark,
.progress-pip--apple .fruit-mark {
  left: 9px;
  top: -4px;
  width: 14px;
  height: 9px;
  border-radius: 50% 50% 40% 40%;
  background: #79ad61;
}

.progress-pip--grape .progress-fruit {
  --fruit-detail:
    radial-gradient(circle at 35% 34%, rgba(255,255,255,0.14) 0 7px, transparent 7.5px),
    radial-gradient(circle at 58% 38%, rgba(68, 45, 126, 0.22) 0 7px, transparent 7.5px),
    radial-gradient(circle at 48% 62%, rgba(255,255,255,0.1) 0 8px, transparent 8.5px);
}

.progress-pip--orange .progress-fruit {
  --fruit-detail:
    radial-gradient(circle at 38% 36%, rgba(255, 217, 139, 0.9) 0 1.4px, transparent 2px),
    radial-gradient(circle at 58% 48%, rgba(255, 217, 139, 0.78) 0 1.3px, transparent 2px),
    radial-gradient(circle at 45% 66%, rgba(255, 217, 139, 0.7) 0 1.2px, transparent 2px);
}

.progress-pip--kiwi .progress-fruit {
  --fruit-detail:
    radial-gradient(circle, rgba(246, 235, 190, 0.9) 0 33%, transparent 34%),
    repeating-conic-gradient(from 0deg, rgba(63, 78, 49, 0.18) 0 6deg, transparent 6deg 18deg);
}

.progress-pip--pear .progress-fruit {
  border-radius: 52% 48% 56% 56%;
  --fruit-detail:
    radial-gradient(circle at 37% 35%, rgba(115, 110, 58, 0.24) 0 1.4px, transparent 2px),
    radial-gradient(circle at 58% 55%, rgba(115, 110, 58, 0.2) 0 1.4px, transparent 2px),
    radial-gradient(circle at 44% 70%, rgba(115, 110, 58, 0.18) 0 1.2px, transparent 2px);
}

.progress-pip--peach .progress-fruit {
  --fruit-detail: linear-gradient(100deg, transparent 0 49%, rgba(185, 78, 93, 0.3) 50%, transparent 53% 100%);
}

.progress-pip--pineapple .progress-fruit {
  border-radius: 45% 45% 54% 54%;
  --fruit-detail:
    repeating-linear-gradient(45deg, transparent 0 7px, rgba(122, 91, 38, 0.22) 7px 9px),
    repeating-linear-gradient(-45deg, transparent 0 7px, rgba(122, 91, 38, 0.16) 7px 9px);
}

.progress-pip--pineapple .fruit-mark {
  left: 7px;
  top: -7px;
  width: 18px;
  height: 12px;
  background: linear-gradient(135deg, transparent 0 35%, #6fa75d 36% 58%, transparent 59%);
}

.progress-pip--melon .progress-fruit {
  --fruit-detail:
    repeating-linear-gradient(28deg, transparent 0 8px, rgba(248, 244, 198, 0.58) 8px 10px),
    repeating-linear-gradient(-28deg, transparent 0 9px, rgba(248, 244, 198, 0.42) 9px 11px);
}

.progress-pip--watermelon .progress-fruit {
  --fruit-detail:
    linear-gradient(70deg, transparent 0 16%, rgba(18, 104, 57, 0.42) 17% 32%, transparent 33% 47%, rgba(18, 104, 57, 0.46) 48% 64%, transparent 65% 100%);
}

.path-label {
  min-width: 0;
  display: grid;
  gap: 1px;
}

.path-step {
  color: rgba(102, 122, 110, 0.58);
  font-size: 9px;
  font-weight: 900;
  line-height: 1;
}

.path-name {
  overflow: hidden;
  color: rgba(55, 72, 63, 0.84);
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 12px;
  font-weight: 950;
  line-height: 1.1;
}

.progress-pip.is-active {
  opacity: 1;
  filter: saturate(1);
}

.progress-pip.is-current {
  opacity: 1;
  background: rgba(255, 255, 255, 0.48);
  box-shadow:
    inset 0 0 0 1px rgba(255, 255, 255, 0.7),
    0 8px 18px rgba(76, 55, 36, 0.08);
}

.progress-pip.is-current .progress-fruit {
  transform: scale(1.08);
  box-shadow:
    inset 0 -5px 8px rgba(58, 39, 29, 0.13),
    inset 0 0 0 2px rgba(255, 255, 255, 0.66),
    0 0 0 4px rgba(255, 242, 188, 0.64),
    0 8px 18px rgba(69, 48, 31, 0.16);
}

.progress-pip.is-current .path-step {
  color: rgba(217, 128, 91, 0.72);
}

.progress-pip.is-current .path-name {
  color: #3d554b;
}

.path-status {
  min-height: 34px;
  display: grid;
  place-items: center;
  padding: 7px 8px;
  border: 1px solid rgba(74, 97, 83, 0.1);
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.46);
  color: rgba(54, 72, 62, 0.82);
  font-size: 12px;
  font-weight: 900;
  line-height: 1.1;
}

.overlay {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  padding: 26px;
  background: rgba(255, 249, 237, 0.68);
  opacity: 0;
  pointer-events: none;
  transition: opacity 180ms ease;
  backdrop-filter: blur(10px);
}

.overlay.is-visible {
  opacity: 1;
  pointer-events: auto;
}

.result-card {
  width: min(92%, 330px);
  padding: 24px 22px 22px;
  border: 1px solid rgba(77, 96, 79, 0.16);
  border-radius: 22px;
  background: rgba(255, 254, 249, 0.94);
  box-shadow: 0 28px 80px rgba(70, 45, 30, 0.18);
  text-align: center;
}

.result-title {
  margin: 0;
  font-size: 28px;
  font-weight: 950;
}

.result-score {
  margin: 12px 0 18px;
  color: var(--muted);
  font-weight: 800;
}

.primary-button {
  width: 100%;
  height: 46px;
  border: 0;
  border-radius: 23px;
  background: linear-gradient(180deg, #ffad91, #ed7768);
  color: white;
  box-shadow: 0 12px 28px rgba(224, 106, 88, 0.26);
  cursor: pointer;
  font: 900 16px/1 "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
}

.primary-button:active {
  transform: translateY(1px);
}

@media (max-width: 820px) {
  .game-shell {
    width: min(calc(100vw - clamp(16px, 4vw, 44px)), 520px);
  }

  .play-zone {
    grid-template-columns: 1fr;
    grid-template-rows: minmax(0, 1fr);
  }

  .path-scrim {
    position: absolute;
    inset: 0;
    z-index: 6;
    display: block;
    border: 0;
    border-radius: 20px;
    background: rgba(71, 58, 43, 0.08);
    opacity: 0;
    pointer-events: none;
    transition: opacity 180ms ease;
  }

  .game-shell.is-path-open .path-scrim {
    opacity: 1;
    pointer-events: auto;
  }

  .evolution-card {
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    z-index: 7;
    min-height: auto;
    max-height: min(54dvh, 380px);
    grid-template-columns: 1fr;
    grid-template-rows: auto minmax(0, 1fr) auto;
    gap: 8px;
    padding: 12px;
    opacity: 0;
    pointer-events: none;
    transform: translateY(-8px) scale(0.98);
    transform-origin: top center;
    transition: opacity 180ms ease, transform 180ms ease;
    overflow: hidden;
  }

  .game-shell.is-path-open .evolution-card {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0) scale(1);
  }

  .evolution-title {
    text-align: center;
    font-size: 12px;
    line-height: 1;
  }

  .fruit-progress {
    width: 100%;
    height: auto;
    min-height: 0;
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    grid-template-rows: none;
    grid-auto-rows: minmax(62px, auto);
    align-items: stretch;
    gap: 7px;
    padding: 0;
    overflow: auto;
  }

  .fruit-progress::before {
    display: none;
  }

  .progress-pip,
  .progress-pip.is-active,
  .progress-pip.is-current {
    min-width: 0;
    min-height: 62px;
    display: grid;
    grid-template-columns: 1fr;
    justify-items: center;
    gap: 5px;
    padding: 7px 3px 6px;
    border: 1px solid rgba(74, 97, 83, 0.08);
    background: rgba(255, 255, 255, 0.34);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
  }

  .progress-pip.is-current {
    transform: translateY(-1px);
    background: rgba(255, 255, 255, 0.62);
  }

  .progress-fruit {
    width: 30px;
    height: 30px;
  }

  .path-label {
    display: grid;
    justify-items: center;
    text-align: center;
  }

  .path-step {
    display: none;
  }

  .path-name {
    max-width: 100%;
    font-size: 11px;
  }

  .path-status {
    min-height: 30px;
    font-size: 12px;
  }
}

@media (max-width: 520px) {
  .app {
    padding: 8px;
    min-height: 100dvh;
  }

  .game-shell {
    height: 100%;
    gap: 8px;
  }

  .topbar {
    grid-template-columns: 1fr auto;
    grid-template-areas:
      "brand controls"
      "scores scores";
    padding: 8px;
  }

  .brand {
    grid-area: brand;
    text-align: left;
    min-width: 0;
  }

  .control-row {
    grid-area: controls;
    gap: 6px;
  }

  .score-grid {
    grid-area: scores;
    width: 100%;
  }

  .score-box {
    min-height: 40px;
  }

  .icon-button {
    width: 38px;
    height: 38px;
    font-size: 20px;
  }

  .next-pill {
    min-width: 92px;
    height: 38px;
    grid-template-columns: 23px auto;
    column-gap: 6px;
    padding: 4px 7px 4px 6px;
  }

  .mini-fruit {
    width: 23px;
    height: 23px;
  }

  .next-caption {
    display: none;
  }

  .next-name {
    max-width: 46px;
    font-size: 12px;
  }

  .evolution-card {
    max-height: min(58dvh, 390px);
    padding: 10px;
  }

  .fruit-progress {
    grid-template-columns: repeat(4, minmax(0, 1fr));
    grid-auto-rows: minmax(58px, auto);
    gap: 6px;
  }

  .progress-pip,
  .progress-pip.is-active,
  .progress-pip.is-current {
    min-height: 58px;
  }

  .progress-fruit {
    width: 28px;
    height: 28px;
  }
}
</style>
</head>
<body>
  <div class="app">
    <main class="game-shell" id="gameShell" aria-label="合成大西瓜">
      <header class="topbar">
        <div class="score-grid" aria-label="分数">
          <div class="score-box">
            <span class="score-label">本局</span>
            <span class="score-value" id="scoreValue">0</span>
          </div>
          <div class="score-box">
            <span class="score-label">最高</span>
            <span class="score-value" id="bestValue">0</span>
          </div>
        </div>
        <div class="brand">
          <span class="brand-title" id="brandTitle">合成大西瓜</span>
          <span class="brand-sub" id="brandSub">果香轻落</span>
        </div>
        <div class="control-row">
          <div class="watermelon-trophy" id="watermelonTrophy" aria-label="已合成大西瓜 0 个">
            <span class="trophy-fruit" aria-hidden="true"></span>
            <span class="trophy-count" id="watermelonCount">0</span>
          </div>
          <button class="next-pill" type="button" id="nextPill" aria-label="展开合成路径" aria-expanded="false" aria-controls="fruitProgress">
            <span class="mini-fruit" id="nextFruitDot"></span>
            <span class="next-caption">下一个</span>
            <span class="next-name" id="nextFruitName">樱桃</span>
          </button>
          <button class="icon-button" type="button" id="soundBtn" aria-label="关闭声音" title="关闭声音">
            <svg class="icon-glyph icon-glyph--sound-on" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 9.5V14.5C4 15.0523 4.44772 15.5 5 15.5H7.6L12.1 19.2C12.6 19.6 13.3 19.25 13.3 18.6V5.4C13.3 4.75 12.6 4.4 12.1 4.8L7.6 8.5H5C4.44772 8.5 4 8.94772 4 9.5Z" fill="currentColor"/>
              <path d="M16.2 8.2C17.5 9.3 18.2 10.8 18.2 12.4C18.2 14 17.5 15.5 16.2 16.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              <path d="M18.6 5.6C20.6 7.3 21.7 9.7 21.7 12.4C21.7 15.1 20.6 17.5 18.6 19.2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>
            </svg>
            <svg class="icon-glyph icon-glyph--sound-off" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 9.5V14.5C4 15.0523 4.44772 15.5 5 15.5H7.6L12.1 19.2C12.6 19.6 13.3 19.25 13.3 18.6V5.4C13.3 4.75 12.6 4.4 12.1 4.8L7.6 8.5H5C4.44772 8.5 4 8.94772 4 9.5Z" fill="currentColor"/>
              <path d="M16.8 9.4L20.8 13.4M20.8 9.4L16.8 13.4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="icon-button" type="button" id="restartBtn" aria-label="重新开始" title="重新开始">
            <svg class="icon-glyph" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M19.5 12C19.5 16.1421 16.1421 19.5 12 19.5C7.85786 19.5 4.5 16.1421 4.5 12C4.5 7.85786 7.85786 4.5 12 4.5C14.7066 4.5 17.0723 5.92662 18.4 8.1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M18.6 4.6V8.6H14.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </header>
      <div class="play-zone">
        <section class="stage-frame">
          <canvas id="gameCanvas" width="480" height="720" tabindex="0" aria-label="游戏画布"></canvas>
          <div class="cheat-toast" id="cheatToast" role="status" aria-live="polite"></div>
          <div class="clear-banner" id="clearBanner" aria-live="polite">
            <div class="clear-celebration">
              <span class="clear-halo" aria-hidden="true"></span>
              <span class="clear-sparkles" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></span>
              <span class="clear-watermelon" aria-hidden="true">
                <span class="clear-watermelon-cheeks"></span>
                <span class="clear-watermelon-leaf"></span>
              </span>
              <strong class="clear-title">大西瓜达成</strong>
              <span class="clear-copy" id="clearCopy">恭喜通关，果园仍可继续</span>
            </div>
          </div>
          <div class="overlay" id="overlay" aria-live="polite">
            <div class="result-card">
              <h1 class="result-title">本局结束</h1>
              <p class="result-score">得分 <strong id="resultScore">0</strong> · 最高 <strong id="resultBest">0</strong></p>
              <button class="primary-button" type="button" id="playAgainBtn">再来一局</button>
            </div>
          </div>
        </section>
        <button class="path-scrim" type="button" id="pathScrim" aria-label="收起合成路径"></button>
        <aside class="evolution-card" aria-label="水果合成路径">
          <div class="evolution-title">合成路径</div>
          <div class="fruit-progress" id="fruitProgress" aria-label="水果合成路径"></div>
          <div class="path-status" id="pathStatus">当前最高：樱桃</div>
        </aside>
      </div>
    </main>
    <div class="catalog-drag-ghost" id="catalogDragGhost" aria-hidden="true">
      <span class="catalog-ghost-fruit" id="catalogGhostFruit"></span>
      <span id="catalogGhostName">樱桃</span>
    </div>
  </div>
